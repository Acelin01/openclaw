<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw Artifact Client Demo</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 和 ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- 引入 Babel 用于解析 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      body {
        background-color: #f3f4f6;
        padding: 20px;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      .chat-bubble {
        max-width: 800px;
        margin: 0 auto;
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      }
    </style>
  </head>
  <body>
    <div class="chat-bubble">
      <h1 class="text-2xl font-bold mb-4 text-gray-800">🤖 OpenClaw Artifact Client</h1>
      <p class="text-gray-600 mb-6">
        模拟场景：Agent 调用了
        <code>project-manager:Get Project JSON</code> 工具，前端拦截结果并渲染组件。
      </p>

      <!-- 组件挂载点 -->
      <div id="root"></div>
    </div>

    <!-- 这里的代码模拟了 loader.tsx 和 project-manager-card.tsx 的合并逻辑 -->
    <script type="text/babel">
      const { useState, useEffect } = React;

      // --- 1. 组件定义 (project-manager-card.tsx) ---
      const ProjectManagerCard = ({ data }) => {
        const [activeTab, setActiveTab] = useState("kanban");

        const pendingTasks = data.tasks.filter((t) => t.status === "PENDING");
        const inProgressTasks = data.tasks.filter((t) => t.status === "IN_PROGRESS");
        const completedTasks = data.tasks.filter((t) => t.status === "COMPLETED");

        const KanbanColumn = ({ title, status, tasks, color }) => (
          <div className={`flex flex-col h-full rounded-lg ${color} p-4 min-h-[300px]`}>
            <h3 className="font-semibold mb-4 flex justify-between items-center text-gray-700">
              {title}
              <span className="bg-white px-2 py-0.5 rounded-full text-xs border border-gray-200">
                {tasks.length}
              </span>
            </h3>
            <div className="flex-1 space-y-3 pr-1">
              {tasks.map((task) => (
                <div
                  key={task.id}
                  className="bg-white p-3 rounded shadow-sm border border-gray-100 hover:shadow-md transition-shadow cursor-pointer group"
                >
                  <div className="text-sm text-gray-800 font-medium mb-1">{task.description}</div>
                  <div className="text-xs text-gray-400 flex justify-between items-center mt-2">
                    <span>ID: {task.id}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );

        return (
          <div className="bg-white rounded-lg border border-gray-200 shadow-sm font-sans">
            <div className="flex justify-between items-center p-4 border-b bg-gray-50 rounded-t-lg">
              <h2 className="text-lg font-bold text-gray-800 flex items-center gap-2">
                🏗️ 项目概览
              </h2>
              <div className="flex gap-2">
                <button
                  onClick={() => setActiveTab("kanban")}
                  className={`px-3 py-1 rounded text-sm transition-colors ${activeTab === "kanban" ? "bg-blue-600 text-white shadow-sm" : "bg-white text-gray-600 border"}`}
                >
                  看板
                </button>
                <button
                  onClick={() => setActiveTab("docs")}
                  className={`px-3 py-1 rounded text-sm transition-colors ${activeTab === "docs" ? "bg-blue-600 text-white shadow-sm" : "bg-white text-gray-600 border"}`}
                >
                  文档
                </button>
              </div>
            </div>

            <div className="p-4">
              {activeTab === "kanban" ? (
                <div className="grid grid-cols-3 gap-4">
                  <KanbanColumn
                    title="待处理"
                    status="PENDING"
                    tasks={pendingTasks}
                    color="bg-gray-100"
                  />
                  <KanbanColumn
                    title="进行中"
                    status="IN_PROGRESS"
                    tasks={inProgressTasks}
                    color="bg-blue-50"
                  />
                  <KanbanColumn
                    title="已完成"
                    status="COMPLETED"
                    tasks={completedTasks}
                    color="bg-green-50"
                  />
                </div>
              ) : (
                <div className="space-y-4">
                  {data.requirements.map((req) => (
                    <div key={req.id} className="bg-white p-4 rounded-lg border border-gray-200">
                      <h3 className="font-bold text-gray-800 mb-2">{req.id}</h3>
                      <pre className="whitespace-pre-wrap text-sm text-gray-600 bg-gray-50 p-3 rounded">
                        {req.content}
                      </pre>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>
        );
      };

      // --- 3. 加载器逻辑 (loader.tsx) ---
      const App = () => {
        const [loading, setLoading] = useState(true);
        const [data, setData] = useState(null);
        const [error, setError] = useState(null);

        useEffect(() => {
          // 真实场景：从 project.json 加载数据（模拟 Agent 生成的结果）
          fetch("./project.json")
            .then((res) => {
              if (!res.ok) throw new Error("无法加载 project.json");
              return res.json();
            })
            .then((jsonData) => {
              // 模拟一点延迟，让加载动画出现
              setTimeout(() => {
                setData(jsonData);
                setLoading(false);
              }, 800);
            })
            .catch((err) => {
              console.error(err);
              setError(err.message);
              setLoading(false);
            });
        }, []);

        if (loading) {
          return (
            <div className="flex items-center justify-center p-10 space-x-2 text-blue-600">
              <div className="animate-spin rounded-full h-6 w-6 border-b-2 border-blue-600"></div>
              <span>正在从 Agent 获取最新项目数据...</span>
            </div>
          );
        }

        if (error) {
          return (
            <div className="p-4 text-red-500 bg-red-50 rounded border border-red-200">
              错误：{error} <br />
              <span className="text-sm text-gray-500">
                请确保已运行 scripts/export-project-json.sh 生成数据文件。
              </span>
            </div>
          );
        }

        return <ProjectManagerCard data={data} />;
      };

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
