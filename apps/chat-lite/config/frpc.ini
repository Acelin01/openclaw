# FRP 客户端配置文件
# 用于将本地 Gateway 服务暴露到远程服务器

[common]
# 服务器地址
server_addr = 192.168.31.154
# 服务器端口
server_port = 7000
# 认证 Token
token = openclaw-platform-token-2026
# 客户端 ID
client_id = machine-XLY.local
# 日志配置
log_file = /Users/acelin/.openclaw-frp/frpc.log
log_level = info
log_max_days = 7

# OpenClaw Gateway 代理配置
[openclaw-gateway]
# 代理类型：TCP
type = tcp
# 本地服务地址
local_ip = 127.0.0.1
# 本地 Gateway 端口
local_port = 18789
# 远程服务器端口（外部访问）
remote_port = 60123
# 健康检查配置
health_check_type = tcp
health_check_interval_s = 30
health_check_timeout_s = 10
health_check_max_failed = 3
# 带宽限制（可选）
# bandwidth_limit = 100MB
# 加密（可选）
# use_encryption = true
# 压缩（可选）
# use_compression = true
