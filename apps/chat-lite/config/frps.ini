# FRP 服务器端配置文件 (frps.ini)
# 放置在服务器 192.168.31.154 上

[common]
# 绑定地址（所有网络接口）
bind_addr = 0.0.0.0
# 绑定端口（客户端连接此端口）
bind_port = 7000

# 认证 Token（必须与客户端一致）
token = openclaw-platform-token-2026

# 日志配置
log_file = /var/log/frp/frps.log
log_level = info
log_max_days = 7

# Dashboard 配置（可选，用于监控）
dashboard_addr = 0.0.0.0
dashboard_port = 7500
dashboard_user = admin
dashboard_pwd = admin123

# 连接池配置（可选）
max_pool_count = 5
tcp_mux = true

# 心跳配置
heartbeat_timeout = 90

# 子域名配置（可选）
subdomain_host = openclaw.local
