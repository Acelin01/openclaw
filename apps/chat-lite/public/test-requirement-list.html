<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>需求列表 - ChatLite</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #f0f2f5;
      padding: 30px 20px;
      color: #262626;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    
    .header {
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    .header h1 { font-size: 24px; color: #1f1f1f; display: flex; align-items: center; gap: 8px; }
    #status { font-size: 14px; }
    #status.success { color: #10b981; }
    #status.error { color: #ef4444; }
    
    /* 筛选工具栏 */
    .filter-toolbar {
      background: white;
      padding: 16px 20px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }
    
    .filter-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .filter-label {
      font-size: 13px;
      color: #595959;
      white-space: nowrap;
    }
    
    .filter-input, .filter-select {
      padding: 6px 12px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      font-size: 13px;
      transition: all 0.2s;
    }
    .filter-input:focus, .filter-select:focus {
      outline: none;
      border-color: #40a9ff;
      box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.1);
    }
    .filter-input { width: 200px; }
    .filter-select { min-width: 120px; }
    
    .search-wrapper {
      position: relative;
      flex: 1;
      min-width: 200px;
    }
    .search-input {
      width: 100%;
      padding: 6px 12px 6px 36px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      font-size: 13px;
    }
    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #8c8c8c;
      pointer-events: none;
    }
    
    .btn {
      padding: 6px 16px;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary { background: #52c41a; color: white; border-color: #52c41a; }
    .btn-primary:hover { background: #73d13d; border-color: #73d13d; }
    .btn-primary:disabled { background: #d9d9d9; border-color: #d9d9d9; cursor: not-allowed; }
    .btn-default { background: white; color: #595959; border-color: #d9d9d9; }
    .btn-default:hover { color: #52c41a; border-color: #52c41a; }
    .btn-sm { padding: 4px 12px; font-size: 12px; }
    .btn-danger { background: #fff1f0; color: #cf1322; border-color: #ffa39c; }
    .btn-danger:hover { background: #ffccc7; border-color: #ff4d4f; }
    
    /* 批量操作栏 */
    .batch-action-bar {
      display: none;
      background: #e6f7ff;
      border: 1px solid #91d5ff;
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
      align-items: center;
      gap: 12px;
    }
    .batch-action-bar.active { display: flex; }
    .batch-count {
      font-size: 13px;
      color: #096dd9;
      font-weight: 500;
    }
    .batch-actions {
      display: flex;
      gap: 8px;
      margin-left: auto;
    }
    
    /* 表格卡片 */
    .demand-card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    
    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid #f0f0f0;
      background: #fafafa;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-header h2 {
      font-size: 16px;
      font-weight: 600;
      color: #1f1f1f;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .record-count {
      font-size: 13px;
      color: #8c8c8c;
      background: #f5f5f5;
      padding: 4px 12px;
      border-radius: 20px;
    }
    
    .table-responsive { overflow-x: auto; }
    .requirement-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      min-width: 1000px;
    }
    .requirement-table th {
      background: #fafafa;
      padding: 14px 16px;
      text-align: left;
      font-weight: 500;
      color: #595959;
      border-bottom: 1px solid #f0f0f0;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      width: 40px;
    }
    .requirement-table th:first-child { width: 50px; }
    .requirement-table th:hover { background: #f0f0f0; }
    .requirement-table th .sort-icon { margin-left: 4px; opacity: 0.5; }
    .requirement-table th.sorted .sort-icon { opacity: 1; color: #52c41a; }
    
    .requirement-table td {
      padding: 14px 16px;
      border-bottom: 1px solid #f0f0f0;
      white-space: nowrap;
      color: #262626;
      vertical-align: middle;
    }
    .requirement-table tbody tr:hover { background: #fafafa; }
    .requirement-table tbody tr.selected { background: #e6f7ff; }
    
    .checkbox-cell { text-align: center; }
    .checkbox-cell input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
    }
    
    .requirement-title {
      color: #262626;
      font-weight: 500;
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: pointer;
    }
    .requirement-title:hover { color: #52c41a; text-decoration: underline; }
    
    .status-badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 500;
      min-width: 64px;
      text-align: center;
    }
    .status-pending, .status-draft { background: #fff7e6; color: #d46b08; border: 1px solid #ffd591; }
    .status-in_progress, .status-in-progress { background: #e6f7ff; color: #096dd9; border: 1px solid #91d5ff; }
    .status-completed, .status-approved { background: #f6ffed; color: #389e0d; border: 1px solid #b7eb8f; }
    .status-rejected { background: #fff1f0; color: #cf1322; border: 1px solid #ffa39c; }
    .status-review { background: #f9f0ff; color: #722ed1; border: 1px solid #d3adf7; }
    
    .priority-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }
    .priority-critical { background: #fff1f0; color: #cf1322; }
    .priority-high { background: #fff7e6; color: #d46b08; }
    .priority-medium { background: #f0f5ff; color: #2f54eb; }
    .priority-low { background: #f6ffed; color: #389e0d; }
    .priority-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .priority-critical .priority-dot { background: #ff4d4f; }
    .priority-high .priority-dot { background: #faad14; }
    .priority-medium .priority-dot { background: #2f54eb; }
    .priority-low .priority-dot { background: #52c41a; }
    
    .user-info { display: flex; align-items: center; gap: 8px; }
    .user-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: #52c41a;
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 500;
      flex-shrink: 0;
    }
    .user-email {
      font-size: 13px;
      color: #262626;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .action-group { display: flex; gap: 8px; }
    .action-icon {
      width: 32px; height: 32px;
      border: 1px solid #d9d9d9;
      background: white;
      border-radius: 4px;
      cursor: pointer;
      color: #8c8c8c;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .action-icon:hover {
      background: #f5f5f5;
      color: #52c41a;
      border-color: #52c41a;
    }
    .action-icon svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; fill: none; }
    
    .date-text { color: #595959; font-size: 13px; }
    
    /* 分页器 */
    .pagination {
      padding: 16px 20px;
      border-top: 1px solid #f0f0f0;
      background: #fafafa;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    
    .pagination-info {
      font-size: 13px;
      color: #595959;
    }
    
    .pagination-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    
    .page-size-select {
      padding: 6px 12px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }
    
    .page-btn {
      padding: 6px 12px;
      border: 1px solid #d9d9d9;
      background: white;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      color: #595959;
      transition: all 0.2s;
    }
    .page-btn:hover:not(:disabled) {
      color: #52c41a;
      border-color: #52c41a;
    }
    .page-btn:disabled {
      background: #f5f5f5;
      color: #d9d9d9;
      cursor: not-allowed;
    }
    .page-btn.active {
      background: #52c41a;
      color: white;
      border-color: #52c41a;
    }
    
    .empty-state {
      padding: 60px 24px;
      text-align: center;
      color: #8c8c8c;
    }
    .empty-state svg {
      width: 64px; height: 64px;
      margin-bottom: 16px;
      color: #d9d9d9;
    }
    
    @media (max-width: 768px) {
      body { padding: 20px 12px; }
      .filter-toolbar { flex-direction: column; align-items: stretch; }
      .filter-group { width: 100%; }
      .filter-input { width: 100%; }
      .search-wrapper { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>
        <svg width="24" height="24" viewBox="0 0 20 20" fill="none">
          <path d="M3 6H17M3 10H13M3 14H9" stroke="#52c41a" stroke-width="1.8" stroke-linecap="round"/>
          <circle cx="16" cy="14" r="2" stroke="#52c41a" stroke-width="1.8"/>
        </svg>
        需求列表
      </h1>
      <span id="status">加载中...</span>
    </div>
    
    <!-- 批量操作栏 -->
    <div class="batch-action-bar" id="batch-bar">
      <span class="batch-count">已选择 <span id="selected-count">0</span> 项</span>
      <div class="batch-actions">
        <button class="btn btn-default btn-sm" onclick="batchUpdateStatus('IN_PROGRESS')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          设为进行中
        </button>
        <button class="btn btn-default btn-sm" onclick="batchUpdateStatus('COMPLETED')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          设为已完成
        </button>
        <button class="btn btn-danger btn-sm" onclick="batchDelete()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
          </svg>
          批量删除
        </button>
        <button class="btn btn-default btn-sm" onclick="clearSelection()">
          取消选择
        </button>
      </div>
    </div>
    
    <!-- 筛选工具栏 -->
    <div class="filter-toolbar">
      <div class="search-wrapper">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" class="search-input" id="search-input" placeholder="搜索需求标题或描述..." onkeyup="handleSearch(event)">
      </div>
      
      <div class="filter-group">
        <label class="filter-label">状态</label>
        <select class="filter-select" id="filter-status" onchange="applyFilters()">
          <option value="">全部状态</option>
          <option value="PENDING">待处理</option>
          <option value="IN_PROGRESS">进行中</option>
          <option value="COMPLETED">已完成</option>
          <option value="REJECTED">已拒绝</option>
          <option value="REVIEW">审核中</option>
        </select>
      </div>
      
      <div class="filter-group">
        <label class="filter-label">优先级</label>
        <select class="filter-select" id="filter-priority" onchange="applyFilters()">
          <option value="">全部优先级</option>
          <option value="CRITICAL">紧急</option>
          <option value="HIGH">高</option>
          <option value="MEDIUM">中</option>
          <option value="LOW">低</option>
        </select>
      </div>
      
      <div class="filter-group">
        <button class="btn btn-default btn-sm" onclick="resetFilters()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/>
          </svg>
          重置
        </button>
        <button class="btn btn-primary btn-sm" onclick="loadRequirements()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 21h5v-5"/>
          </svg>
          刷新
        </button>
      </div>
    </div>
    
    <!-- 需求列表 -->
    <div class="demand-card">
      <div class="card-header">
        <h2>
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
            <path d="M3 6H17M3 10H13M3 14H9" stroke="#52c41a" stroke-width="1.8" stroke-linecap="round"/>
            <circle cx="16" cy="14" r="2" stroke="#52c41a" stroke-width="1.8"/>
          </svg>
          全部需求
        </h2>
        <span class="record-count" id="record-count">0 条记录</span>
      </div>
      
      <div class="table-responsive">
        <table class="requirement-table">
          <thead>
            <tr>
              <th class="checkbox-cell">
                <input type="checkbox" id="select-all" onchange="toggleSelectAll()">
              </th>
              <th onclick="sortBy('title')">标题 <span class="sort-icon">↕</span></th>
              <th onclick="sortBy('status')">状态 <span class="sort-icon">↕</span></th>
              <th onclick="sortBy('priority')">优先级 <span class="sort-icon">↕</span></th>
              <th>负责人</th>
              <th>创建者</th>
              <th onclick="sortBy('createdAt')">创建时间 <span class="sort-icon">↕</span></th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="requirements-body">
            <tr><td colspan="8" class="empty-state">加载中...</td></tr>
          </tbody>
        </table>
      </div>
      
      <!-- 分页器 -->
      <div class="pagination">
        <div class="pagination-info">
          显示 <span id="show-from">0</span> - <span id="show-to">0</span> 条，共 <span id="total-count">0</span> 条
        </div>
        <div class="pagination-controls">
          <select class="page-size-select" id="page-size" onchange="changePageSize()">
            <option value="10">10 条/页</option>
            <option value="20">20 条/页</option>
            <option value="50">50 条/页</option>
            <option value="100">100 条/页</option>
          </select>
          <button class="page-btn" id="prev-btn" onclick="prevPage()" disabled>上一页</button>
          <span class="page-info">第 <span id="current-page">1</span> 页</span>
          <button class="page-btn" id="next-btn" onclick="nextPage()">下一页</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let authToken = '';
    let requirements = [];
    let filteredRequirements = [];
    let currentPage = 1;
    let pageSize = 10;
    let sortByField = 'createdAt';
    let sortOrder = 'desc';
    let currentFilter = { status: '', priority: '', search: '' };
    let selectedIds = new Set();
    
    // 登录获取 token
    async function login() {
      try {
        const res = await fetch('http://localhost:8000/api/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: 'test@uxin.com', password: 'test123' })
        });
        const data = await res.json();
        if (data.success) {
          authToken = data.data.token;
          return true;
        }
        return false;
      } catch (e) {
        console.error('Login error:', e);
        return false;
      }
    }
    
    // 加载需求列表
    async function loadRequirements() {
      const statusEl = document.getElementById('status');
      statusEl.textContent = '加载中...';
      
      try {
        const params = new URLSearchParams({
          projectId: 'proj-uxin',
          skip: (currentPage - 1) * pageSize,
          take: pageSize
        });
        
        if (currentFilter.status) params.append('status', currentFilter.status);
        if (currentFilter.priority) params.append('priority', currentFilter.priority);
        
        const res = await fetch(`http://localhost:8000/api/v1/project-requirements?${params}`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        const data = await res.json();
        
        if (data.success) {
          requirements = data.data;
          applyFilters();
          statusEl.textContent = `✅ 已加载 ${requirements.length} 条需求`;
          statusEl.className = 'success';
        } else {
          throw new Error(data.message || '加载失败');
        }
      } catch (e) {
        console.error('Load error:', e);
        statusEl.textContent = '❌ 加载失败';
        statusEl.className = 'error';
        document.getElementById('requirements-body').innerHTML = `
          <tr><td colspan="8" class="empty-state">加载失败：${e.message}</td></tr>
        `;
      }
    }
    
    // 应用筛选
    function applyFilters() {
      const status = document.getElementById('filter-status').value;
      const priority = document.getElementById('filter-priority').value;
      const search = document.getElementById('search-input').value.toLowerCase();
      
      currentFilter = { status, priority, search };
      
      filteredRequirements = requirements.filter(req => {
        if (status && req.status !== status) return false;
        if (priority && req.priority !== priority) return false;
        if (search && !req.title.toLowerCase().includes(search) && !req.description?.toLowerCase().includes(search)) return false;
        return true;
      });
      
      sortRequirements();
      renderTable();
      updatePagination();
    }
    
    // 重置筛选
    function resetFilters() {
      document.getElementById('filter-status').value = '';
      document.getElementById('filter-priority').value = '';
      document.getElementById('search-input').value = '';
      currentFilter = { status: '', priority: '', search: '' };
      filteredRequirements = [...requirements];
      sortRequirements();
      renderTable();
      updatePagination();
    }
    
    // 处理搜索
    function handleSearch(event) {
      if (event.key === 'Enter') {
        applyFilters();
      }
    }
    
    // 排序
    function sortBy(field) {
      if (sortByField === field) {
        sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
      } else {
        sortByField = field;
        sortOrder = 'desc';
      }
      sortRequirements();
      renderTable();
    }
    
    function sortRequirements() {
      filteredRequirements.sort((a, b) => {
        let aVal = a[sortByField] || '';
        let bVal = b[sortByField] || '';
        
        if (sortByField === 'createdAt') {
          aVal = new Date(aVal).getTime();
          bVal = new Date(bVal).getTime();
        } else {
          aVal = String(aVal).toLowerCase();
          bVal = String(bVal).toLowerCase();
        }
        
        if (aVal < bVal) return sortOrder === 'asc' ? -1 : 1;
        if (aVal > bVal) return sortOrder === 'asc' ? 1 : -1;
        return 0;
      });
    }
    
    // 渲染表格
    function renderTable() {
      const tbody = document.getElementById('requirements-body');
      const start = (currentPage - 1) * pageSize;
      const end = start + pageSize;
      const pageData = filteredRequirements.slice(start, end);
      
      if (pageData.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="empty-state">暂无需求</td></tr>';
        return;
      }
      
      tbody.innerHTML = pageData.map(req => `
        <tr class="${selectedIds.has(req.id) ? 'selected' : ''}">
          <td class="checkbox-cell">
            <input type="checkbox" data-id="${req.id}" ${selectedIds.has(req.id) ? 'checked' : ''} onchange="toggleSelectOne('${req.id}')">
          </td>
          <td>
            <span class="requirement-title" onclick="viewDetail('${req.id}')" title="${req.title}">${req.title}</span>
          </td>
          <td>
            <span class="status-badge status-${(req.status || 'PENDING').toLowerCase().replace('_', '-')}">
              ${getStatusLabel(req.status || 'PENDING')}
            </span>
          </td>
          <td>
            <span class="priority-badge priority-${(req.priority || 'MEDIUM').toLowerCase()}">
              <span class="priority-dot"></span>
              ${getPriorityLabel(req.priority || 'MEDIUM')}
            </span>
          </td>
          <td>
            ${req.assigneeId ? `
              <div class="user-info">
                <span class="user-avatar">${getUserInitial(req.assigneeId)}</span>
                <span class="user-email">${req.assigneeId}</span>
              </div>
            ` : '<span style="color:#bfbfbf">—</span>'}
          </td>
          <td>
            ${req.reporterId ? `
              <div class="user-info">
                <span class="user-avatar">${getUserInitial(req.reporterId)}</span>
                <span class="user-email">${req.reporterId}</span>
              </div>
            ` : '<span style="color:#bfbfbf">系统</span>'}
          </td>
          <td><span class="date-text">${formatDate(req.createdAt)}</span></td>
          <td>
            <div class="action-group">
              <button class="action-icon" title="查看" onclick="viewDetail('${req.id}')">
                <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
              <button class="action-icon" title="编辑" onclick="editRequirement('${req.id}')">
                <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
              </button>
              <button class="action-icon" title="删除" onclick="deleteRequirement('${req.id}')">
                <svg viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
              </button>
            </div>
          </td>
        </tr>
      `).join('');
      
      updateBatchBar();
    }
    
    // 批量操作
    function toggleSelectAll() {
      const checkbox = document.getElementById('select-all');
      const start = (currentPage - 1) * pageSize;
      const end = start + pageSize;
      const pageData = filteredRequirements.slice(start, end);
      
      if (checkbox.checked) {
        pageData.forEach(req => selectedIds.add(req.id));
      } else {
        pageData.forEach(req => selectedIds.delete(req.id));
      }
      
      renderTable();
    }
    
    function toggleSelectOne(id) {
      if (selectedIds.has(id)) {
        selectedIds.delete(id);
      } else {
        selectedIds.add(id);
      }
      
      renderTable();
    }
    
    function updateBatchBar() {
      const batchBar = document.getElementById('batch-bar');
      const selectedCount = document.getElementById('selected-count');
      
      if (selectedIds.size > 0) {
        batchBar.classList.add('active');
        selectedCount.textContent = selectedIds.size;
      } else {
        batchBar.classList.remove('active');
      }
      
      // 更新全选框状态
      const selectAll = document.getElementById('select-all');
      const start = (currentPage - 1) * pageSize;
      const end = start + pageSize;
      const pageData = filteredRequirements.slice(start, end);
      const allSelected = pageData.length > 0 && pageData.every(req => selectedIds.has(req.id));
      selectAll.checked = allSelected;
    }
    
    function clearSelection() {
      selectedIds.clear();
      renderTable();
    }
    
    async function batchUpdateStatus(status) {
      if (selectedIds.size === 0) {
        alert('请先选择需求');
        return;
      }
      
      if (!confirm(`确定要将选中的 ${selectedIds.size} 个需求设为${getStatusLabel(status)}吗？`)) return;
      
      try {
        let successCount = 0;
        for (const id of selectedIds) {
          const res = await fetch(`http://localhost:8000/api/v1/project-requirements/${id}`, {
            method: 'PATCH',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${authToken}`
            },
            body: JSON.stringify({ status })
          });
          const data = await res.json();
          if (data.success) successCount++;
        }
        
        alert(`✅ 成功更新 ${successCount}/${selectedIds.size} 个需求`);
        selectedIds.clear();
        loadRequirements();
      } catch (e) {
        alert('❌ 批量更新失败：' + e.message);
      }
    }
    
    async function batchDelete() {
      if (selectedIds.size === 0) {
        alert('请先选择需求');
        return;
      }
      
      if (!confirm(`确定要删除选中的 ${selectedIds.size} 个需求吗？此操作不可恢复！`)) return;
      
      try {
        let successCount = 0;
        for (const id of selectedIds) {
          const res = await fetch(`http://localhost:8000/api/v1/project-requirements/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${authToken}` }
          });
          const data = await res.json();
          if (data.success) successCount++;
        }
        
        alert(`✅ 成功删除 ${successCount}/${selectedIds.size} 个需求`);
        selectedIds.clear();
        loadRequirements();
      } catch (e) {
        alert('❌ 批量删除失败：' + e.message);
      }
    }
    
    // 更新分页
    function updatePagination() {
      const total = filteredRequirements.length;
      const totalPages = Math.ceil(total / pageSize);
      
      document.getElementById('show-from').textContent = total > 0 ? (currentPage - 1) * pageSize + 1 : 0;
      document.getElementById('show-to').textContent = Math.min(currentPage * pageSize, total);
      document.getElementById('total-count').textContent = total;
      document.getElementById('current-page').textContent = currentPage;
      document.getElementById('record-count').textContent = `${total} 条记录`;
      
      document.getElementById('prev-btn').disabled = currentPage === 1;
      document.getElementById('next-btn').disabled = currentPage >= totalPages;
    }
    
    // 分页控制
    function prevPage() {
      if (currentPage > 1) {
        currentPage--;
        renderTable();
        updatePagination();
      }
    }
    
    function nextPage() {
      const totalPages = Math.ceil(filteredRequirements.length / pageSize);
      if (currentPage < totalPages) {
        currentPage++;
        renderTable();
        updatePagination();
      }
    }
    
    function changePageSize() {
      pageSize = parseInt(document.getElementById('page-size').value);
      currentPage = 1;
      renderTable();
      updatePagination();
    }
    
    // 辅助函数
    function getStatusLabel(status) {
      const map = {
        PENDING: '待处理', IN_PROGRESS: '进行中', COMPLETED: '已完成',
        REJECTED: '已拒绝', REVIEW: '审核中', DRAFT: '草稿'
      };
      return map[status] || status;
    }
    
    function getPriorityLabel(priority) {
      const map = { CRITICAL: '紧急', HIGH: '高', MEDIUM: '中', LOW: '低' };
      return map[priority] || priority;
    }
    
    function getUserInitial(email) {
      return email ? email.charAt(0).toUpperCase() : '?';
    }
    
    function formatDate(dateStr) {
      if (!dateStr) return '-';
      const date = new Date(dateStr);
      return date.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' });
    }
    
    // 操作函数
    function viewDetail(id) {
      window.location.href = `/test-requirement-detail.html?id=${id}`;
    }
    
    function editRequirement(id) {
      alert('编辑功能：' + id);
    }
    
    async function deleteRequirement(id) {
      if (!confirm('确定要删除这个需求吗？')) return;
      
      try {
        const res = await fetch(`http://localhost:8000/api/v1/project-requirements/${id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        const data = await res.json();
        
        if (data.success) {
          alert('✅ 需求已删除');
          loadRequirements();
        } else {
          alert('❌ 删除失败：' + data.message);
        }
      } catch (e) {
        alert('❌ 删除失败：' + e.message);
      }
    }
    
    // 初始化
    async function init() {
      const success = await login();
      if (success) {
        await loadRequirements();
      } else {
        document.getElementById('status').textContent = '❌ 登录失败';
        document.getElementById('status').className = 'error';
      }
    }
    
    init();
  </script>
</body>
</html>
