<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChatLite 连接测试</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .status { padding: 10px; margin: 10px 0; border-radius: 4px; }
    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }
    .info { background: #d1ecf1; color: #0c5460; }
    button { padding: 8px 16px; margin: 5px; cursor: pointer; }
    pre { background: #f5f5f5; padding: 10px; overflow: auto; }
  </style>
</head>
<body>
  <h1>🔌 ChatLite 连接测试</h1>
  
  <h2>1. 配置文件加载</h2>
  <div id="config-status" class="status info">正在加载...</div>
  <pre id="config-data"></pre>
  
  <h2>2. WebSocket 连接测试</h2>
  <button onclick="testWebSocket()">测试连接 ws://127.0.0.1:18789</button>
  <div id="ws-status" class="status info">等待测试...</div>
  
  <h2>3. 修复验证</h2>
  <div id="fix-status"></div>
  
  <script>
    // 测试配置文件加载
    fetch('/config/agents.config.json')
      .then(res => res.json())
      .then(data => {
        document.getElementById('config-status').className = 'status success';
        document.getElementById('config-status').textContent = '✅ 配置文件加载成功';
        document.getElementById('config-data').textContent = JSON.stringify(data, null, 2);
      })
      .catch(err => {
        document.getElementById('config-status').className = 'status error';
        document.getElementById('config-status').textContent = '❌ 配置文件加载失败：' + err.message;
      });
    
    // 测试 WebSocket 连接
    function testWebSocket() {
      const statusEl = document.getElementById('ws-status');
      statusEl.className = 'status info';
      statusEl.textContent = '🔄 正在连接...';
      
      const wsUrl = 'ws://127.0.0.1:18789?token=openclaw-auto-token-2026';
      const ws = new WebSocket(wsUrl);
      
      const timeout = setTimeout(() => {
        ws.close();
        statusEl.className = 'status error';
        statusEl.textContent = '❌ 连接超时（5 秒）- Gateway 服务未运行';
      }, 5000);
      
      ws.onopen = () => {
        clearTimeout(timeout);
        statusEl.className = 'status success';
        statusEl.textContent = '✅ WebSocket 连接成功！Gateway 服务运行正常';
        ws.close();
      };
      
      ws.onerror = () => {
        clearTimeout(timeout);
        statusEl.className = 'status error';
        statusEl.textContent = '❌ 连接失败 - Gateway 服务未运行';
      };
    }
    
    // 显示修复验证信息
    setTimeout(() => {
      const fixStatusEl = document.getElementById('fix-status');
      fixStatusEl.innerHTML = `
        <div class="status success">
          <h3>✅ 已修复的问题：</h3>
          <ul>
            <li><strong>WebSocket API 兼容性</strong>: 从 Node.js ws.on() 改为浏览器 addEventListener()</li>
            <li><strong>连接状态判断</strong>: 只有真正连接成功才显示"已连接"</li>
            <li><strong>错误处理</strong>: 发送消息失败时显示详细错误信息</li>
            <li><strong>状态更新</strong>: 从 30 秒缩短到 5 秒，更快响应离线状态</li>
            <li><strong>离线提示</strong>: 离线时输入框禁用并显示提示</li>
          </ul>
        </div>
      `;
    }, 100);
  </script>
</body>
</html>
