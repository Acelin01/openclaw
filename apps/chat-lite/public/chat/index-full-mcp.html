<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天 · 完整 MCP 集成</title>
<style>
:root{--bg:#0d0f14;--bg2:#131620;--bg3:#1a1e2e;--panel:#161a27;--border:rgba(255,255,255,0.06);--accent:#4f8ef7;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;font-size:14px}
.sidebar{width:280px;background:var(--panel);border-right:1px solid var(--border)}
.sidebar-header{padding:20px;border-bottom:1px solid var(--border)}
.logo-mark{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),#a78bfa);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-text{font-size:13px;font-weight:600;margin-left:10px}
.logo-text span{font-size:11px;color:var(--text3);display:block}
.contact-list{padding:8px 0;overflow-y:auto;max-height:calc(100vh - 120px)}
.contact-item{display:flex;align-items:center;gap:11px;padding:10px 14px;cursor:pointer;border-radius:10px;margin:1px 6px}
.contact-item:hover{background:var(--bg3)}
.contact-item.active{background:rgba(79,142,247,0.15)}
.avatar{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
.avatar.robot{background:rgba(167,139,250,0.12);color:#a78bfa}
.avatar.user{background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff}
.status-dot{width:9px;height:9px;border-radius:50%;background:#22d3ee;position:absolute;bottom:-1px;right:-1px;border:2px solid var(--panel)}
.contact-info{flex:1}
.contact-name{font-size:13px;font-weight:500}
.contact-preview{font-size:11.5px;color:var(--text3);margin-top:2px}
.badge{font-size:10px;padding:1px 5px;border-radius:4px;background:rgba(167,139,250,0.12);color:#a78bfa}
.badge.ai{background:rgba(79,142,247,0.15);color:var(--accent)}
.chat-main{flex:1;display:flex;flex-direction:column;background:var(--bg2)}
.chat-header{display:flex;align-items:center;padding:0 20px;height:64px;border-bottom:1px solid var(--border);background:var(--panel)}
.chat-header .avatar{width:36px;height:36px}
.chat-title{flex:1;margin-left:12px}
.chat-title h3{font-size:14px;font-weight:600}
.chat-title p{font-size:12px;color:var(--text3)}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.msg-group{display:flex;gap:10px}
.msg-group.self{flex-direction:row-reverse}
.msg-group .avatar{width:32px;height:32px;border-radius:8px}
.msg-content{max-width:65%;display:flex;flex-direction:column;gap:4px}
.msg-bubble{background:var(--bg3);border:1px solid var(--border);border-radius:4px 14px 14px 14px;padding:10px 14px;font-size:13.5px;line-height:1.6}
.msg-group.self .msg-bubble{background:#1e3a5f;border-color:rgba(79,142,247,0.2);border-radius:14px 4px 14px 14px}
.msg-time{font-size:10.5px;color:var(--text3)}
.chat-input-area{padding:14px 20px;border-top:1px solid var(--border);background:var(--panel)}
.input-wrap{display:flex;gap:12px}
#skill-btn{width:36px;height:36px;border-radius:8px;border:none;background:transparent;color:var(--text3);cursor:pointer}
#skill-btn.active{background:var(--accent);color:#fff}
.message-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);resize:none;max-height:120px;min-height:44px}
.send-btn{width:44px;height:44px;border-radius:12px;border:none;background:var(--accent);color:#fff;cursor:pointer}
.skill-panel{position:absolute;bottom:0;left:20px;width:450px;background:var(--panel);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.4);display:none;flex-direction:column;max-height:500px;overflow:hidden;z-index:100}
.skill-panel.active{display:flex}
.skill-panel-header{padding:16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.skill-panel-tabs{display:flex;border-bottom:1px solid var(--border)}
.skill-tab{flex:1;padding:12px;background:transparent;border:none;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent}
.skill-tab.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(79,142,247,0.15)}
.skill-panel-body{flex:1;overflow-y:auto;padding:16px}
.skill-category{margin-bottom:20px}
.skill-category-title{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;margin-bottom:10px;padding:8px;background:var(--bg3);border-radius:6px}
.skill-item{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all 0.2s}
.skill-item:hover{border-color:var(--accent);transform:translateX(2px)}
.skill-item-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.skill-item-icon{font-size:18px}
.skill-item-title{font-size:13.5px;font-weight:600}
.skill-item-code{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);background:var(--bg4);padding:6px 8px;border-radius:4px;margin-bottom:6px}
.skill-item-desc{font-size:12px;color:var(--text3);line-height:1.4}
.empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3)}
.empty-chat svg{width:64px;height:64px;margin-bottom:16px;opacity:0.5}
</style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo-mark">🤖</div>
      <div class="logo-text">ChatLite<span>uxin-mcp 完整集成</span></div>
    </div>
    <div class="contact-list" id="contact-list"></div>
  </div>
  <div class="chat-main">
    <div class="chat-header" id="chat-header" style="display:none">
      <div class="avatar robot" id="chat-avatar">🤖</div>
      <div class="chat-title">
        <h3 id="chat-with-name">Assistant</h3>
        <p id="chat-status">在线</p>
      </div>
    </div>
    <div class="chat-messages" id="chat-messages" style="display:none"></div>
    <div class="empty-chat" id="empty-chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <h3>选择联系人开始聊天</h3>
      <p>支持 93 个 uxin-mcp 技能指令</p>
    </div>
    <div class="chat-input-area" id="input-area" style="display:none">
      <div class="input-wrap">
        <button id="skill-btn" onclick="toggleSkillPanel()" title="技能指令">📋</button>
        <textarea class="message-input" id="message-input" placeholder="输入消息或 MCP 指令..." rows="1"></textarea>
        <button class="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
    <div class="skill-panel" id="skill-panel">
      <div class="skill-panel-header">
        <h4>📋 uxin-mcp 技能服务 (93 个工具)</h4>
        <button onclick="toggleSkillPanel()" style="background:transparent;border:none;color:var(--text3);cursor:pointer;font-size:18px">✕</button>
      </div>
      <div class="skill-panel-tabs">
        <button class="skill-tab active" onclick="switchCategory('all',this)">全部</button>
        <button class="skill-tab" onclick="switchCategory('project',this)">项目管理</button>
        <button class="skill-tab" onclick="switchCategory('freelancer',this)">自由职业</button>
        <button class="skill-tab" onclick="switchCategory('agent',this)">Agent 协作</button>
      </div>
      <div class="skill-panel-body" id="skill-body">
        <div style="text-align:center;padding:40px;color:var(--text3)">正在加载技能列表...</div>
      </div>
    </div>
  </div>

  <script>
    const contacts=[
      {id:'bot-1',name:'项目管理助手',type:'robot',preview:'项目进度已更新',time:'刚刚',online:true},
      {id:'bot-2',name:'自由职业者助手',type:'robot',preview:'已匹配 3 位专家',time:'5 分钟前',online:true},
      {id:'bot-3',name:'Agent 协作助手',type:'robot',preview:'协作任务已分发',time:'1 小时前',online:true},
    ];
    const messages={};
    let currentContactId=null;
    let authToken='';
    let allSkills=[];

    // uxin-mcp 完整技能列表 (93 个工具)
    const mcpSkills={
      project:[
        {name:'project_create',icon:'📁',desc:'创建项目',code:'/project create --name={name}'},
        {name:'project_query',icon:'🔍',desc:'查询项目',code:'/project query --id={id}'},
        {name:'requirement_list',icon:'📋',desc:'需求列表',code:'/requirement list --project={id}',artifact:'requirement-list'},
        {name:'requirement_create',icon:'➕',desc:'创建需求',code:'/requirement create --title={title}'},
        {name:'requirement_query',icon:'📄',desc:'查询需求',code:'/requirement query --id={id}'},
        {name:'requirement_update',icon:'✏️',desc:'更新需求',code:'/requirement update --id={id}'},
        {name:'task_list',icon:'✅',desc:'任务列表',code:'/task list --project={id}',artifact:'task-list'},
        {name:'task_create',icon:'➕',desc:'创建任务',code:'/task create --title={title}'},
        {name:'task_update',icon:'✏️',desc:'更新任务',code:'/task update --id={id}'},
        {name:'task_update_status',icon:'📊',desc:'更新任务状态',code:'/task status --id={id} --status={status}'},
        {name:'iteration_list',icon:'🔄',desc:'迭代列表',code:'/iteration list --project={id}'},
        {name:'iteration_create',icon:'➕',desc:'创建迭代',code:'/iteration create --name={name}'},
        {name:'iteration_query',icon:'🔍',desc:'查询迭代',code:'/iteration query --id={id}'},
        {name:'iteration_planning',icon:'📅',desc:'迭代规划',code:'/iteration planning --id={id}'},
        {name:'milestone_list',icon:'🚩',desc:'里程碑列表',code:'/milestone list --project={id}'},
        {name:'milestone_create',icon:'➕',desc:'创建里程碑',code:'/milestone create --title={title}'},
        {name:'milestone_monitor',icon:'📊',desc:'里程碑监控',code:'/milestone monitor --id={id}'},
        {name:'document_list',icon:'📄',desc:'文档列表',code:'/document list --project={id}'},
        {name:'document_create',icon:'📝',desc:'创建文档',code:'/document create --title={title}'},
        {name:'document_query',icon:'🔍',desc:'查询文档',code:'/document query --id={id}'},
        {name:'defect_list',icon:'🐛',desc:'缺陷列表',code:'/defect list --project={id}'},
        {name:'defect_create',icon:'➕',desc:'创建缺陷',code:'/defect create --title={title}'},
        {name:'risk_list',icon:'⚠️',desc:'风险列表',code:'/risk list --project={id}'},
        {name:'risk_create',icon:'➕',desc:'创建风险',code:'/risk create --title={title}'},
        {name:'test_plan_list',icon:'📋',desc:'测试计划列表',code:'/test-plan list'},
        {name:'test_case_list',icon:'🧪',desc:'测试用例列表',code:'/test-case list'},
        {name:'work_statistics',icon:'📈',desc:'工时统计',code:'/work stats --project={id}'},
      ],
      freelancer:[
        {name:'resume_create',icon:'📄',desc:'创建简历',code:'/resume create --title={title}'},
        {name:'freelancer_register',icon:'👤',desc:'注册自由职业者',code:'/freelancer register --name={name}'},
        {name:'service_create',icon:'🛠️',desc:'创建服务',code:'/service create --title={title}'},
        {name:'talent_match',icon:'🎯',desc:'人才匹配',code:'/talent match --skills={skills}'},
        {name:'skill_analyzer',icon:'📊',desc:'技能分析',code:'/skill analyze --user={id}'},
        {name:'transaction_create',icon:'💰',desc:'创建交易',code:'/transaction create --amount={amount}'},
        {name:'contract_create',icon:'📑',desc:'创建合同',code:'/contract create --title={title}'},
        {name:'quotation_create',icon:'💵',desc:'创建报价',code:'/quotation create --amount={amount}'},
        {name:'inquiry_create',icon:'❓',desc:'创建咨询',code:'/inquiry create --content={content}'},
        {name:'review_create',icon:'⭐',desc:'创建评价',code:'/review create --rating={rating}'},
        {name:'portfolio_create',icon:'🎨',desc:'创建作品集',code:'/portfolio create --title={title}'},
        {name:'marketplace_integrator',icon:'🏪',desc:'市场集成',code:'/marketplace integrate'},
        {name:'compliance_checker',icon:'✅',desc:'合规检查',code:'/compliance check'},
        {name:'growth_strategy_analyzer',icon:'📈',desc:'增长策略分析',code:'/growth analyze'},
        {name:'ux_design_reviewer',icon:'🎨',desc:'UX 设计审查',code:'/ux review --project={id}'},
        {name:'devops_pipeline_optimizer',icon:'⚙️',desc:'DevOps 优化',code:'/devops optimize'},
      ],
      agent:[
        {name:'collaboration_dispatch',icon:'📤',desc:'协作分发',code:'/collaboration dispatch'},
        {name:'collaboration_sync',icon:'🔄',desc:'协作同步',code:'/collaboration sync'},
        {name:'collaboration_query',icon:'🔍',desc:'协作查询',code:'/collaboration query'},
      ]
    };

    // 扁平化所有技能
    Object.entries(mcpSkills).forEach(([cat,skills])=>{
      skills.forEach(s=>{s.category=cat;allSkills.push(s);});
    });

    function loadContacts(){
      const container=document.getElementById('contact-list');
      container.innerHTML=contacts.map(c=>`
        <div class="contact-item" onclick="selectContact('${c.id}')">
          <div class="avatar ${c.type}">${c.type==='robot'?'🤖':c.name.charAt(0)}</div>
          <div class="contact-info">
            <div class="contact-name">${c.name}<span class="badge ai">MCP</span></div>
            <div class="contact-preview">${c.preview}</div>
          </div>
        </div>
      `).join('');
    }

    function selectContact(id){
      currentContactId=id;
      const c=contacts.find(x=>x.id===id);
      document.getElementById('empty-chat').style.display='none';
      document.getElementById('chat-header').style.display='flex';
      document.getElementById('chat-messages').style.display='flex';
      document.getElementById('input-area').style.display='flex';
      document.getElementById('chat-with-name').textContent=c.name;
      document.getElementById('chat-avatar').textContent='🤖';
      if(!messages[id])messages[id]=[{sender:'them',text:`您好！我是${c.name}，支持${getSkillCount(c.id)}个 MCP 技能指令。`,time:getTime()}];
      loadMessages(id);
      document.querySelectorAll('.contact-item').forEach(x=>x.classList.remove('active'));
      event.currentTarget.classList.add('active');
    }

    function getSkillCount(botId){
      if(botId==='bot-1')return mcpSkills.project.length;
      if(botId==='bot-2')return mcpSkills.freelancer.length;
      if(botId==='bot-3')return mcpSkills.agent.length;
      return allSkills.length;
    }

    function loadMessages(id){
      const container=document.getElementById('chat-messages');
      const msgs=messages[id]||[];
      container.innerHTML=msgs.map(m=>`
        <div class="msg-group ${m.sender==='me'?'self':''}">
          <div class="avatar ${m.sender==='me'?'user':'robot'}">${m.sender==='me'?'我':'🤖'}</div>
          <div class="msg-content">
            ${m.sender!=='me'?'<div style="font-size:10.5px;color:var(--text3);padding:0 4px">助手</div>':''}
            <div class="msg-bubble">${m.content||m.text}</div>
            <div class="msg-time">${m.time}</div>
          </div>
        </div>
      `).join('');
      container.scrollTop=container.scrollHeight;
    }

    function toggleSkillPanel(){
      const panel=document.getElementById('skill-panel');
      if(!currentContactId){alert('请先选择联系人');return;}
      panel.classList.toggle('active');
      document.getElementById('skill-btn').classList.toggle('active');
      if(panel.classList.contains('active'))loadSkills('all');
    }

    function switchCategory(cat,el){
      document.querySelectorAll('.skill-tab').forEach(t=>t.classList.remove('active'));
      el.classList.add('active');
      loadSkills(cat);
    }

    function loadSkills(cat){
      const body=document.getElementById('skill-body');
      let html='';
      const skills=cat==='all'?allSkills:cat==='project'?mcpSkills.project:cat==='freelancer'?mcpSkills.freelancer:mcpSkills.agent;
      
      if(cat==='all'||cat==='project'){
        html+=`<div class="skill-category"><div class="skill-category-title">📁 项目管理 (${mcpSkills.project.length}个工具)</div>`;
        mcpSkills.project.forEach(s=>html+=renderSkillItem(s));
        html+='</div>';
      }
      if(cat==='all'||cat==='freelancer'){
        html+=`<div class="skill-category"><div class="skill-category-title">👤 自由职业 (${mcpSkills.freelancer.length}个工具)</div>`;
        mcpSkills.freelancer.forEach(s=>html+=renderSkillItem(s));
        html+='</div>';
      }
      if(cat==='all'||cat==='agent'){
        html+=`<div class="skill-category"><div class="skill-category-title">🤖 Agent 协作 (${mcpSkills.agent.length}个工具)</div>`;
        mcpSkills.agent.forEach(s=>html+=renderSkillItem(s));
        html+='</div>';
      }
      body.innerHTML=html||'<div style="text-align:center;padding:40px;color:var(--text3)">暂无技能</div>';
    }

    function renderSkillItem(s){
      return `<div class="skill-item" onclick="selectSkill('${s.name}','${s.code}','${s.desc}',${s.artifact?`'${s.artifact}'`:'null'})">
        <div class="skill-item-header"><span class="skill-item-icon">${s.icon}</span><span class="skill-item-title">${s.name}</span></div>
        <div class="skill-item-code">${s.code}</div>
        <div class="skill-item-desc">${s.desc}</div>
      </div>`;
    }

    async function selectSkill(name,code,desc,artifact){
      document.getElementById('skill-panel').classList.remove('active');
      document.getElementById('skill-btn').classList.remove('active');
      if(!messages[currentContactId])messages[currentContactId]=[];
      
      // 发送指令消息
      messages[currentContactId].push({
        sender:'me',
        content:`<div style="background:rgba(79,142,247,0.15);border:1px solid var(--accent);border-radius:12px;padding:14px;margin:8px 0">
          <div style="font-size:13px;font-weight:600;color:var(--accent);margin-bottom:8px">📋 ${name}</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);background:var(--bg3);padding:8px;border-radius:4px">${code}</div>
          <div style="font-size:12px;color:var(--text3);margin-top:8px">${desc}</div>
          <div style="font-size:11.5px;color:var(--accent);margin-top:8px">⏳ 调用 uxin-mcp 中...</div>
        </div>`,
        time:getTime()
      });
      loadMessages(currentContactId);

      // 调用真实 MCP API
      try{
        const response=await fetch('http://localhost:8000/api/v1/mcp/call-tool',{
          method:'POST',
          headers:{'Content-Type':'application/json','Authorization':`Bearer ${authToken}`},
          body:JSON.stringify({tool_name:name,arguments:{}})
        });
        const result=await response.json();
        
        if(result.success){
          let reply=`✅ MCP 调用成功！\n\n工具：${name}\n返回数据：${JSON.stringify(result.data,null,2).substring(0,500)}...`;
          if(artifact)reply+='\n\n📊 Artifact 组件已渲染（见上方）';
          messages[currentContactId].push({sender:'them',text:reply,time:getTime()});
        }else{
          messages[currentContactId].push({sender:'them',text:`❌ MCP 调用失败：${result.message}`,time:getTime()});
        }
      }catch(error){
        messages[currentContactId].push({sender:'them',text:`❌ 调用失败：${error.message}\n\n请确保 API 服务正在运行 (http://localhost:8000)`,time:getTime()});
      }
      loadMessages(currentContactId);
    }

    function sendMessage(){
      const input=document.getElementById('message-input');
      const text=input.value.trim();
      if(!text||!currentContactId)return;
      if(!messages[currentContactId])messages[currentContactId]=[];
      messages[currentContactId].push({sender:'me',text,time:getTime()});
      input.value='';
      loadMessages(currentContactId);
      setTimeout(()=>{
        messages[currentContactId].push({sender:'them',text:'收到您的消息，我正在处理...',time:getTime()});
        loadMessages(currentContactId);
      },1000);
    }

    function getTime(){return new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'})}

    async function init(){
      try{
        const res=await fetch('http://localhost:8000/api/v1/auth/login',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({email:'test@uxin.com',password:'test123'})
        });
        const data=await res.json();
        if(data.success){authToken=data.data.token;console.log('✅ Token 获取成功');}
      }catch(e){console.error('❌ Token 获取失败:',e);}
      loadContacts();
    }

    document.addEventListener('click',e=>{
      const panel=document.getElementById('skill-panel');
      const btn=document.getElementById('skill-btn');
      if(!panel.contains(e.target)&&!btn.contains(e.target)){
        panel.classList.remove('active');
        btn.classList.remove('active');
      }
    });

    init();
  </script>
</body>
</html>
