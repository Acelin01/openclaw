<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>聊天 - ChatLite</title>
  <style>
    :root {
      --bg: #0d0f14;
      --bg2: #131620;
      --bg3: #1a1e2e;
      --panel: #161a27;
      --border: rgba(255,255,255,0.06);
      --border2: rgba(255,255,255,0.1);
      --accent: #4f8ef7;
      --robot: #a78bfa;
      --robot-bg: rgba(167,139,250,0.12);
      --user-msg: #1e3a5f;
      --other-msg: #1a1e2e;
      --text: #e2e8f0;
      --text2: #94a3b8;
      --text3: #64748b;
      --online: #22d3ee;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      font-size: 14px;
    }

    /* SIDEBAR */
    .sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 20px 18px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-mark {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--robot));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .logo-text {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.2;
    }
    .logo-text span { color: var(--text3); font-weight: 400; font-size: 11px; display: block; }

    .sidebar-search {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }

    .search-input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 10px 7px 32px;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }
    .search-input:focus { border-color: var(--accent); }

    .contact-list { flex: 1; overflow-y: auto; padding: 8px 0; }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px 14px;
      cursor: pointer;
      border-radius: 10px;
      margin: 1px 6px;
      transition: background 0.2s;
    }
    .contact-item:hover { background: var(--bg3); }
    .contact-item.active { background: rgba(79,142,247,0.15); }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      position: relative;
      font-weight: 600;
    }
    .avatar.robot { background: var(--robot-bg); color: var(--robot); }
    .avatar.user { background: linear-gradient(135deg, #3b82f6, #10b981); color: #fff; }

    .status-dot {
      position: absolute;
      bottom: -1px;
      right: -1px;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      border: 2px solid var(--panel);
      background: var(--online);
    }

    .contact-info { flex: 1; min-width: 0; }
    .contact-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 1px 5px;
      border-radius: 4px;
      background: var(--robot-bg);
      color: var(--robot);
    }
    .contact-preview {
      font-size: 11.5px;
      color: var(--text3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }

    .unread-count {
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      min-width: 18px;
      height: 18px;
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 5px;
      flex-shrink: 0;
    }

    /* CHAT MAIN */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      background: var(--bg2);
    }

    .chat-header {
      display: flex;
      align-items: center;
      padding: 0 20px;
      height: 64px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      gap: 12px;
      flex-shrink: 0;
    }

    .chat-header .avatar { width: 36px; height: 36px; font-size: 14px; }
    .chat-title h3 { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .chat-title p { font-size: 12px; color: var(--text3); margin-top: 1px; }

    /* MESSAGES */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .day-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text3);
      font-size: 11px;
    }
    .day-divider::before, .day-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .msg-group { display: flex; gap: 10px; }
    .msg-group.self { flex-direction: row-reverse; }

    .msg-group .avatar { width: 32px; height: 32px; font-size: 12px; border-radius: 8px; }

    .msg-content { max-width: 65%; display: flex; flex-direction: column; gap: 4px; }
    .msg-group.self .msg-content { align-items: flex-end; }

    .msg-sender { font-size: 11.5px; color: var(--text3); padding: 0 4px; }

    .msg-bubble {
      background: var(--other-msg);
      border: 1px solid var(--border);
      border-radius: 4px 14px 14px 14px;
      padding: 10px 14px;
      font-size: 13.5px;
      line-height: 1.6;
      color: var(--text);
      word-break: break-word;
    }

    .msg-group.self .msg-bubble {
      background: var(--user-msg);
      border-color: rgba(79,142,247,0.3);
      border-radius: 14px 4px 14px 14px;
    }

    .msg-time { font-size: 10px; color: var(--text3); margin-top: 2px; }

    /* INPUT AREA */
    .chat-input-area {
      padding: 16px 20px;
      background: var(--panel);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-wrapper {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .input-actions {
      display: flex;
      gap: 6px;
      padding-top: 8px;
    }

    .action-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: none;
      background: transparent;
      color: var(--text2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .action-btn:hover { background: var(--bg3); color: var(--text); }

    .message-input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-size: 13.5px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      min-height: 44px;
      outline: none;
    }
    .message-input:focus { border-color: var(--accent); }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: none;
      background: var(--accent);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .send-btn:hover { background: #6ea3ff; transform: translateY(-1px); }
    .send-btn:disabled { background: var(--text3); cursor: not-allowed; transform: none; }

    /* EMPTY STATE */
    .empty-chat {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text3);
    }
    .empty-chat svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.5; }
    .empty-chat h3 { font-size: 16px; margin-bottom: 8px; color: var(--text2); }
    .empty-chat p { font-size: 13px; }
  </style>
</head>
<body>
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo-mark">🤖</div>
      <div class="logo-text">
        ChatLite
        <span>机器人技能共享平台</span>
      </div>
    </div>
    
    <div class="sidebar-search">
      <input type="text" class="search-input" placeholder="搜索联系人...">
    </div>
    
    <div class="contact-list" id="contact-list">
      <!-- 联系人将动态加载 -->
    </div>
  </div>
  
  <!-- CHAT MAIN -->
  <div class="chat-main">
    <div class="chat-header" id="chat-header" style="display: none;">
      <div class="avatar robot">🤖</div>
      <div class="chat-title">
        <h3 id="chat-with-name">
          <span class="badge">AI</span>
          <span>Assistant</span>
        </h3>
        <p id="chat-status">在线</p>
      </div>
    </div>
    
    <div class="chat-messages" id="chat-messages" style="display: none;">
      <!-- 消息将动态加载 -->
    </div>
    
    <div class="empty-chat" id="empty-chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
      </svg>
      <h3>选择联系人开始聊天</h3>
      <p>从左侧列表选择一个联系人或机器人</p>
    </div>
    
    <div class="chat-input-area" id="input-area" style="display: none;">
      <div class="input-wrapper">
        <textarea class="message-input" id="message-input" placeholder="输入消息..." rows="1" onkeydown="handleKeyDown(event)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <script>
    // 模拟联系人数据
    const contacts = [
      { id: 'bot-1', name: 'AI Assistant', type: 'robot', preview: '有什么可以帮您？', time: '刚刚', unread: 0, online: true },
      { id: 'bot-2', name: '需求助手', type: 'robot', preview: '已创建 3 个需求', time: '5 分钟前', unread: 2, online: true },
      { id: 'user-1', name: '张三', type: 'user', preview: '好的，我稍后处理', time: '10 分钟前', unread: 0, online: true },
      { id: 'user-2', name: '李四', type: 'user', preview: '会议改到明天', time: '1 小时前', unread: 5, online: false },
      { id: 'user-3', name: '王五', type: 'user', preview: '收到', time: '昨天', unread: 0, online: false },
    ];

    // 模拟消息数据
    const messages = {
      'bot-1': [
        { id: 1, sender: 'them', text: '您好！我是 AI 助手，有什么可以帮您？', time: '09:00' },
        { id: 2, sender: 'me', text: '帮我创建一个需求', time: '09:01' },
        { id: 3, sender: 'them', text: '好的，请告诉我需求的标题和描述。', time: '09:01' },
      ],
      'bot-2': [
        { id: 1, sender: 'them', text: '您好！我是需求助手。', time: '10:00' },
        { id: 2, sender: 'me', text: '创建需求：用户登录功能', time: '10:01' },
        { id: 3, sender: 'them', text: '✅ 已创建需求：用户登录功能', time: '10:02' },
      ],
    };

    let currentContactId = null;

    // 加载联系人列表
    function loadContacts() {
      const container = document.getElementById('contact-list');
      container.innerHTML = contacts.map(contact => `
        <div class="contact-item ${contact.id === currentContactId ? 'active' : ''}" onclick="selectContact('${contact.id}')">
          <div class="avatar ${contact.type}">
            ${contact.type === 'robot' ? '🤖' : contact.name.charAt(0)}
            ${contact.online ? '<div class="status-dot"></div>' : ''}
          </div>
          <div class="contact-info">
            <div class="contact-name">
              ${contact.name}
              ${contact.type === 'robot' ? '<span class="badge">AI</span>' : ''}
            </div>
            <div class="contact-preview">${contact.preview}</div>
          </div>
          ${contact.unread > 0 ? `<div class="unread-count">${contact.unread}</div>` : ''}
        </div>
      `).join('');
    }

    // 选择联系人
    function selectContact(id) {
      currentContactId = id;
      const contact = contacts.find(c => c.id === id);
      
      // 显示聊天界面
      document.getElementById('empty-chat').style.display = 'none';
      document.getElementById('chat-header').style.display = 'flex';
      document.getElementById('chat-messages').style.display = 'flex';
      document.getElementById('input-area').style.display = 'flex';
      
      // 更新头部
      document.getElementById('chat-with-name').innerHTML = `
        ${contact.type === 'robot' ? '<span class="badge">AI</span>' : ''}
        <span>${contact.name}</span>
      `;
      document.getElementById('chat-status').textContent = contact.online ? '在线' : '离线';
      
      // 加载消息
      loadMessages(id);
      
      // 更新联系人列表
      loadContacts();
    }

    // 加载消息
    function loadMessages(contactId) {
      const container = document.getElementById('chat-messages');
      const msgs = messages[contactId] || [];
      
      if (msgs.length === 0) {
        container.innerHTML = '<div style="text-align: center; color: var(--text3); padding: 40px;">暂无消息</div>';
        return;
      }
      
      container.innerHTML = `
        <div class="day-divider">今天</div>
        ${msgs.map(msg => `
          <div class="msg-group ${msg.sender === 'me' ? 'self' : ''}">
            <div class="avatar ${msg.sender === 'me' ? 'user' : 'robot'}">
              ${msg.sender === 'me' ? '我' : '🤖'}
            </div>
            <div class="msg-content">
              ${msg.sender !== 'me' ? `<div class="msg-sender">${contacts.find(c => c.id === contactId)?.name}</div>` : ''}
              <div class="msg-bubble">${msg.text}</div>
              <div class="msg-time">${msg.time}</div>
            </div>
          </div>
        `).join('')}
      `;
      
      // 滚动到底部
      container.scrollTop = container.scrollHeight;
    }

    // 发送消息
    function sendMessage() {
      const input = document.getElementById('message-input');
      const text = input.value.trim();
      
      if (!text || !currentContactId) return;
      
      // 添加到消息列表
      if (!messages[currentContactId]) {
        messages[currentContactId] = [];
      }
      
      messages[currentContactId].push({
        id: Date.now(),
        sender: 'me',
        text: text,
        time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
      });
      
      input.value = '';
      loadMessages(currentContactId);
      
      // 模拟回复
      setTimeout(() => {
        const reply = {
          id: Date.now() + 1,
          sender: 'them',
          text: '收到您的消息，我正在处理...',
          time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })
        };
        messages[currentContactId].push(reply);
        loadMessages(currentContactId);
      }, 1000);
    }

    // 处理回车发送
    function handleKeyDown(event) {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    }

    // 初始化
    loadContacts();
  </script>
</body>
</html>
