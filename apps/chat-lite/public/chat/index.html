<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天沟通 · ChatLite (MCP 完整集成)</title>
<style>
:root{--bg:#0d0f14;--bg2:#131620;--bg3:#1a1e2e;--bg4:#1f2435;--panel:#161a27;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);--accent:#4f8ef7;--accent2:#6ee7b7;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--online:#22d3ee;--robot:#a78bfa;--robot-bg:rgba(167,139,250,0.12);--user-msg:#1e3a5f;--other-msg:#1a1e2e;--radius:14px;--font:-apple-system,BlinkMacSystemFont,'Noto Sans SC',sans-serif;--mono:'JetBrains Mono',monospace;--transition:0.2s cubic-bezier(0.4,0,0.2,1)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;font-size:14px}
.sidebar{width:280px;min-width:280px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sidebar-header{padding:20px 18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--robot));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-text{font-size:13px;font-weight:600;color:var(--text)}
.logo-text span{color:var(--text3);font-weight:400;font-size:11px;display:block}
.sidebar-search{padding:12px 14px;border-bottom:1px solid var(--border)}
.search-input-wrap{position:relative}
.search-input-wrap svg{position:absolute;left:10px;color:var(--text3);width:14px;height:14px}
.search-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 10px 7px 32px;color:var(--text);font-size:13px;outline:none}
.search-input:focus{border-color:var(--accent)}
.contact-list{flex:1;overflow-y:auto;padding:8px 0}
.contact-group-label{padding:8px 16px 4px;font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase}
.contact-item{display:flex;align-items:center;gap:11px;padding:10px 14px;cursor:pointer;border-radius:10px;margin:1px 6px;position:relative;transition:background var(--transition)}
.contact-item:hover{background:var(--bg3)}
.contact-item.active{background:var(--accent-glow)}
.contact-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--accent);border-radius:0 3px 3px 0}
.avatar{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;position:relative;font-weight:600}
.avatar.robot{background:var(--robot-bg);border:1px solid rgba(167,139,250,0.3);color:var(--robot)}
.avatar.user-a{background:linear-gradient(135deg,#1e40af,#3b82f6);color:#fff;font-size:13px}
.avatar.user-b{background:linear-gradient(135deg,#065f46,#10b981);color:#fff;font-size:13px}
.avatar.user-c{background:linear-gradient(135deg,#7c2d12,#f97316);color:#fff;font-size:13px}
.status-dot{position:absolute;bottom:-1px;right:-1px;width:9px;height:9px;border-radius:50%;border:2px solid var(--panel)}
.status-dot.online{background:var(--online)}
.contact-info{flex:1;min-width:0}
.contact-name{font-size:13px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:5px}
.contact-preview{font-size:11.5px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.badge{font-size:10px;font-weight:600;padding:1px 5px;border-radius:4px;background:var(--robot-bg);color:var(--robot);flex-shrink:0}
.badge.ai{background:rgba(79,142,247,0.15);color:var(--accent)}
.badge.freelancer{background:rgba(110,231,183,0.15);color:var(--accent2)}
.unread-count{background:var(--accent);color:#fff;font-size:10px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 5px;flex-shrink:0}
.unread-count.red{background:#ef4444}
.contact-time{font-size:10.5px;color:var(--text3);position:absolute;top:10px;right:14px}
.chat-main{flex:1;display:flex;flex-direction:column;min-width:0;background:var(--bg2);position:relative}
.chat-header{display:flex;align-items:center;padding:0 20px;height:64px;border-bottom:1px solid var(--border);background:var(--panel);gap:12px;flex-shrink:0}
.chat-header .avatar{width:36px;height:36px;font-size:14px}
.chat-title{flex:1}
.chat-title h3{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px}
.chat-title p{font-size:12px;color:var(--text3);margin-top:1px}
.header-actions{display:flex;align-items:center;gap:6px}
.icon-btn{width:32px;height:32px;border-radius:8px;border:none;background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition)}
.icon-btn:hover{background:var(--bg3);color:var(--text)}
.icon-btn.active{background:var(--bg3);color:var(--accent)}
.icon-btn svg{width:16px;height:16px}
.member-pills{display:flex;align-items:center;gap:4px}
.member-pill{display:flex;align-items:center;gap:5px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:11.5px;color:var(--text2)}
.member-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--online);flex-shrink:0}
.member-pill .dot.robot{background:var(--robot)}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;scroll-behavior:smooth}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-track{background:transparent}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.day-divider{display:flex;align-items:center;gap:12px;color:var(--text3);font-size:11px}
.day-divider::before,.day-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.msg-group{display:flex;gap:10px;animation:fadeIn 0.2s ease}
.msg-group.self{flex-direction:row-reverse}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-group .avatar{width:32px;height:32px;font-size:12px;border-radius:8px;flex-shrink:0;align-self:flex-end}
.msg-content{max-width:65%;display:flex;flex-direction:column;gap:4px}
.msg-group.self .msg-content{align-items:flex-end}
.msg-sender{font-size:11.5px;color:var(--text3);padding:0 4px;display:flex;align-items:center;gap:6px}
.msg-bubble{background:var(--other-msg);border:1px solid var(--border);border-radius:4px 14px 14px 14px;padding:10px 14px;font-size:13.5px;line-height:1.6;position:relative;word-break:break-word}
.msg-group.self .msg-bubble{background:var(--user-msg);border-color:rgba(79,142,247,0.2);border-radius:14px 4px 14px 14px}
.msg-bubble.robot-msg{background:var(--robot-bg);border-color:rgba(167,139,250,0.25);border-radius:4px 14px 14px 14px}
.msg-bubble.command-msg{background:rgba(79,142,247,0.15);border-color:var(--accent);font-family:var(--mono);font-size:12.5px}
.msg-time{font-size:10.5px;color:var(--text3);padding:0 4px;align-self:flex-end}
.command-card{background:var(--bg4);border:1px solid var(--accent);border-radius:12px;padding:14px 16px;max-width:360px;margin:4px 0}
.command-card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.command-card-header svg{color:var(--accent2);width:16px;height:16px;flex-shrink:0}
.command-card-header span{font-size:13px;font-weight:600;color:var(--accent2);font-family:var(--mono)}
.command-card-code{font-family:var(--mono);font-size:12px;color:var(--accent);background:var(--bg3);padding:8px 10px;border-radius:6px;margin-bottom:8px;word-break:break-all}
.command-card-desc{font-size:12px;color:var(--text3);margin-top:8px}
.command-card-status{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--text3)}
.command-card-status.success{color:var(--accent2)}
.command-card-status.error{color:#ef4444}
.command-card-status.loading{color:var(--accent)}
.chat-input-area{padding:14px 20px;border-top:1px solid var(--border);background:var(--panel);flex-shrink:0;display:flex;align-items:center;gap:12px}
#skill-input-btn{width:40px;height:40px;border-radius:10px;border:none;background:var(--bg3);color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition);flex-shrink:0}
#skill-input-btn:hover{background:var(--accent);color:white}
#skill-input-btn.active{background:var(--accent);color:white;box-shadow:0 0 0 3px rgba(79,142,247,0.3)}
.message-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-size:13.5px;font-family:var(--font);resize:none;max-height:120px;min-height:44px;outline:none;transition:border-color var(--transition)}
.message-input:focus{border-color:var(--accent)}
.send-btn{width:44px;height:44px;border-radius:12px;border:none;background:var(--accent);color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition);flex-shrink:0}
.send-btn:hover{background:#3b82f6;transform:translateY(-1px)}
.send-btn:disabled{background:var(--text3);cursor:not-allowed;transform:none}
.empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3)}
.empty-chat svg{width:64px;height:64px;margin-bottom:16px;opacity:0.5}
.empty-chat h3{font-size:16px;margin-bottom:8px;color:var(--text2)}
.empty-chat p{font-size:13px}
.skill-panel{position:absolute;bottom:0;left:20px;width:500px;background:var(--panel);border:1px solid var(--border2);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.4);z-index:100;display:none;flex-direction:column;max-height:550px;overflow:hidden}
.skill-panel.active{display:flex;animation:slideUp 0.3s cubic-bezier(0.4,0,0.2,1)}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.skill-panel-header{padding:16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:var(--bg3)}
.skill-panel-header h4{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;color:var(--text)}
.skill-panel-header h4 svg{width:16px;height:16px;color:var(--accent)}
.skill-panel-close{width:32px;height:32px;border-radius:8px;border:none;background:transparent;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition)}
.skill-panel-close:hover{background:var(--bg4);color:var(--text)}
.skill-panel-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg3)}
.skill-panel-tab{flex:1;padding:14px;background:transparent;border:none;color:var(--text3);font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all var(--transition)}
.skill-panel-tab:hover{background:rgba(79,142,247,0.1);color:var(--text)}
.skill-panel-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.skill-panel-body{flex:1;overflow-y:auto;padding:16px}
.skill-panel-body::-webkit-scrollbar{width:6px}
.skill-panel-body::-webkit-scrollbar-track{background:transparent}
.skill-panel-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.skill-category{margin-bottom:24px}
.skill-category-title{font-size:12px;font-weight:600;color:var(--text);margin-bottom:12px;padding:10px 12px;background:var(--bg4);border-radius:8px;display:flex;align-items:center;gap:8px;border:1px solid var(--border)}
.skill-category-title svg{width:16px;height:16px;color:var(--accent)}
.skill-count{margin-left:auto;font-size:11px;color:var(--text3);background:var(--bg3);padding:2px 8px;border-radius:4px}
.command-item{background:var(--bg4);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;cursor:pointer;transition:all var(--transition);display:flex;gap:12px;align-items:flex-start}
.command-item:hover{border-color:var(--accent);background:var(--bg3);transform:translateX(4px)}
.command-item-icon{width:36px;height:36px;border-radius:10px;background:var(--robot-bg);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.command-item-content{flex:1;min-width:0}
.command-item-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.command-item-title{font-size:13.5px;font-weight:600;color:var(--text)}
.command-item-code{font-family:var(--mono);font-size:11px;color:var(--accent);background:var(--bg3);padding:6px 10px;border-radius:6px;margin-bottom:6px;display:inline-block;word-break:break-all}
.command-item-desc{font-size:12px;color:var(--text3);line-height:1.5;margin-bottom:6px}
.command-item-tags{display:flex;gap:4px;flex-wrap:wrap}
.command-item-tag{font-size:9px;padding:2px 6px;border-radius:4px;background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
@media(max-width:768px){.sidebar{width:70px;min-width:70px}.sidebar-header,.sidebar-search,.contact-info,.contact-time,.unread-count{display:none}.contact-item{justify-content:center;padding:10px}.avatar{width:42px;height:42px}.skill-panel{width:calc(100% - 40px);left:20px}}
</style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo-mark">🤖</div>
      <div class="logo-text">ChatLite<span>uxin-mcp 完整集成</span></div>
    </div>
    <div class="sidebar-search">
      <div class="search-input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" class="search-input" placeholder="搜索联系人..." id="search-input" oninput="filterContacts()">
      </div>
    </div>
    <div class="contact-list" id="contact-list">
      <div class="contact-group-label">机器人</div>
    </div>
  </div>
  <div class="chat-main">
    <div class="chat-header" id="chat-header" style="display: none;">
      <div class="avatar robot" id="chat-avatar">🤖</div>
      <div class="chat-title">
        <h3 id="chat-with-name"><span class="badge ai">AI</span><span>Assistant</span></h3>
        <p id="chat-status">在线</p>
      </div>
      <div class="member-pills"><div class="member-pill"><div class="dot robot"></div><span>AI</span></div></div>
      <div class="header-actions">
        <button class="icon-btn" title="搜索">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
        <button class="icon-btn" title="更多">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
        </button>
      </div>
    </div>
    <div class="chat-messages" id="chat-messages" style="display: none;"></div>
    <div class="empty-chat" id="empty-chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <h3>选择联系人开始聊天</h3>
      <p>点击输入框左侧的 📋 按钮打开技能面板</p>
    </div>
    <div class="chat-input-area" id="input-area" style="display: none;">
      <button id="skill-input-btn" onclick="toggleSkillPanel()" title="技能指令">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
      </button>
      <textarea class="message-input" id="message-input" placeholder="输入消息或 MCP 指令..." rows="1" onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="skill-panel" id="skill-panel">
      <div class="skill-panel-header">
        <h4><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg><span id="skill-panel-title">技能指令</span></h4>
        <button class="skill-panel-close" onclick="toggleSkillPanel()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="skill-panel-tabs" id="skill-tabs"></div>
      <div class="skill-panel-body" id="skill-panel-body"></div>
    </div>
  </div>

  <script>
    const contacts = [
      { id: 'bot-1', name: '项目管理助手', type: 'robot', preview: '项目进度已更新', time: '刚刚', unread: 0, online: true, group: 'robot', skillCategory: 'project', skillCount: 74 },
      { id: 'bot-2', name: '自由职业者助手', type: 'robot', preview: '已为您匹配 3 位专家', time: '5 分钟前', unread: 2, online: true, group: 'robot', skillCategory: 'freelancer', skillCount: 16 },
      { id: 'bot-3', name: 'AI Assistant', type: 'robot', preview: '协作任务已分发', time: '1 小时前', unread: 0, online: true, group: 'robot', skillCategory: 'agent', skillCount: 3 },
      { id: 'user-1', name: '张三', type: 'user-a', preview: '好的，我稍后处理', time: '10 分钟前', unread: 0, online: true, group: 'user', skillCategory: 'project', skillCount: 74 },
      { id: 'user-2', name: '李四', type: 'user-b', preview: '会议改到明天', time: '1 小时前', unread: 5, online: false, group: 'user', skillCategory: 'project', skillCount: 74 },
      { id: 'user-3', name: '王五', type: 'user-c', preview: '收到', time: '昨天', unread: 0, online: true, group: 'user', skillCategory: 'project', skillCount: 74 },
    ];

    const messages = {};
    let currentContactId = null;
    let currentTab = 'all';
    let authToken = '';

    // 项目管理技能 (74 个工具)
    const projectSkills = [
      { id: 1, category: 'requirement', title: '需求列表', icon: '📋', code: '/requirement list --project=proj-uxin', desc: '查询项目需求列表', tags: ['需求', '查询'], mcpTool: 'requirement_list', mcpParams: { project_id: 'proj-uxin' }, artifact: 'requirement-list' },
      { id: 2, category: 'requirement', title: '创建需求', icon: '➕', code: '/requirement create --title={title}', desc: '创建新的项目需求', tags: ['需求', '创建'], mcpTool: 'requirement_create', mcpParams: {} },
      { id: 3, category: 'requirement', title: '查询需求', icon: '📄', code: '/requirement query --id={id}', desc: '查看指定需求详情', tags: ['需求', '查询'], mcpTool: 'requirement_query', mcpParams: {} },
      { id: 4, category: 'requirement', title: '更新需求', icon: '✏️', code: '/requirement update --id={id}', desc: '更新需求信息', tags: ['需求', '更新'], mcpTool: 'requirement_update', mcpParams: {} },
      { id: 5, category: 'task', title: '任务列表', icon: '✅', code: '/task list --project={id}', desc: '查询项目任务列表', tags: ['任务', '查询'], mcpTool: 'task_list', mcpParams: { project_id: 'proj-uxin' }, artifact: 'task-list' },
      { id: 6, category: 'task', title: '创建任务', icon: '➕', code: '/task create --title={title}', desc: '创建新任务', tags: ['任务', '创建'], mcpTool: 'task_create', mcpParams: {} },
      { id: 7, category: 'task', title: '更新任务', icon: '✏️', code: '/task update --id={id}', desc: '更新任务信息', tags: ['任务', '更新'], mcpTool: 'task_update', mcpParams: {} },
      { id: 8, category: 'task', title: '更新任务状态', icon: '📊', code: '/task status --id={id} --status={status}', desc: '更新任务状态', tags: ['任务', '状态'], mcpTool: 'task_update_status', mcpParams: {} },
      { id: 9, category: 'task', title: '查询任务', icon: '🔍', code: '/task query --id={id}', desc: '查询任务详情', tags: ['任务', '查询'], mcpTool: 'task_query', mcpParams: {} },

    function loadContacts(filter = '') {
      const container = document.getElementById('contact-list');
      const filtered = contacts.filter(c => c.name.toLowerCase().includes(filter.toLowerCase()));
      const robots = filtered.filter(c => c.group === 'robot');
      const users = filtered.filter(c => c.group === 'user');
      let html = '<div class="contact-group-label">机器人</div>';
      html += robots.map(contact => renderContactItem(contact)).join('');
      if (users.length > 0) {
        html += '<div class="contact-group-label">人类专家</div>';
        html += users.map(contact => renderContactItem(contact)).join('');
      }
      container.innerHTML = html;
    }

    function renderContactItem(contact) {
      return `<div class="contact-item ${contact.id === currentContactId ? 'active' : ''}" onclick="selectContact('${contact.id}')">
        <div class="avatar ${contact.type}">${contact.type.startsWith('user') ? contact.name.charAt(0) : '🤖'}${contact.online ? '<div class="status-dot"></div>' : ''}</div>
        <div class="contact-info">
          <div class="contact-name">${contact.name}${contact.type === 'robot' ? '<span class="badge ai">AI</span>' : ''}</div>
          <div class="contact-preview">${contact.preview}</div>
        </div>
        ${contact.unread > 0 ? `<div class="unread-count ${contact.unread > 9 ? 'red' : ''}">${contact.unread > 9 ? '9+' : contact.unread}</div>` : ''}
        <div class="contact-time">${contact.time}</div>
      </div>`;
    }

    function selectContact(id) {
      console.log('✅ 选择联系人:', id);
      currentContactId = id;
      const contact = contacts.find(c => c.id === id);
      document.getElementById('empty-chat').style.display = 'none';
      document.getElementById('chat-header').style.display = 'flex';
      document.getElementById('chat-messages').style.display = 'flex';
      document.getElementById('input-area').style.display = 'flex';
      document.getElementById('chat-with-name').innerHTML = `${contact.type === 'robot' ? '<span class="badge ai">AI</span>' : ''}<span>${contact.name}</span>`;
      document.getElementById('chat-status').textContent = contact.online ? '在线' : '离线';
      document.getElementById('chat-avatar').className = `avatar ${contact.type}`;
      document.getElementById('chat-avatar').textContent = contact.type.startsWith('user') ? contact.name.charAt(0) : '🤖';
      if (!messages[id]) messages[id] = [{ id: 1, sender: 'them', text: `您好！我是${contact.name}，支持${contact.skillCount}个 MCP 技能指令。点击输入框左侧的 📋 按钮查看。`, time: getTime(), type: 'text' }];
      loadMessages(id);
      loadContacts(document.getElementById('search-input').value);
      document.getElementById('skill-panel').classList.remove('active');
      document.getElementById('skill-input-btn').classList.remove('active');
    }

    function loadMessages(contactId) {
      const container = document.getElementById('chat-messages');
      const msgs = messages[contactId] || [];
      if (msgs.length === 0) { container.innerHTML = '<div style="text-align: center; color: var(--text3); padding: 40px;">暂无消息</div>'; return; }
      container.innerHTML = `<div class="day-divider">今天</div>${msgs.map(msg => renderMessage(msg, contactId)).join('')}`;
      container.scrollTop = container.scrollHeight;
    }

    function renderMessage(msg, contactId) {
      const contact = contacts.find(c => c.id === contactId);
      const isSelf = msg.sender === 'me';
      if (msg.type === 'command') {
        return `<div class="msg-group ${isSelf ? 'self' : ''}">
          <div class="avatar ${isSelf ? 'user-a' : 'robot'}">${isSelf ? '我' : '🤖'}</div>
          <div class="msg-content">
            ${!isSelf ? `<div class="msg-sender">${contact.name}</div>` : ''}
            <div class="msg-bubble command-msg">
              <div class="command-card">
                <div class="command-card-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg><span>${msg.command.title}</span></div>
                <div class="command-card-code">${msg.command.code}</div>
                <div class="command-card-desc">${msg.command.desc}</div>
                <div class="command-card-status ${msg.command.status || 'success'}"><span>${msg.command.status === 'error' ? '❌ 执行失败' : msg.command.status === 'loading' ? '⏳ 调用 uxin-mcp 中...' : '✅ 已发送指令'}</span></div>
              </div>
              ${msg.artifact ? `<div style="margin-top:12px;">${msg.artifact}</div>` : ''}
            </div>
            <div class="msg-time">${msg.time}</div>
          </div>
        </div>`;
      }
      return `<div class="msg-group ${isSelf ? 'self' : ''}">
        <div class="avatar ${isSelf ? 'user-a' : contact.type === 'robot' ? 'robot' : 'user-a'}">${isSelf ? '我' : (contact.type === 'robot' ? '🤖' : contact.name.charAt(0))}</div>
        <div class="msg-content">
          ${!isSelf ? `<div class="msg-sender">${contact.name}</div>` : ''}
          <div class="msg-bubble ${contact.type === 'robot' && !isSelf ? 'robot-msg' : ''}">${msg.text}</div>
          <div class="msg-time">${msg.time}</div>
        </div>
      </div>`;
    }

    function toggleSkillPanel() {
      console.log('🔘 点击技能面板按钮，currentContactId:', currentContactId);
      const panel = document.getElementById('skill-panel');
      if (!currentContactId) { alert('请先选择一个联系人'); return; }
      const isActive = panel.classList.contains('active');
      panel.classList.toggle('active');
      document.getElementById('skill-input-btn').classList.toggle('active');
      if (panel.classList.contains('active') && !isActive) loadSkillCommands();
    }

    function switchTab(tab, el) {
      currentTab = tab;
      document.querySelectorAll('.skill-panel-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      loadSkillCommands();
    }

    function loadSkillCommands() {
      console.log('📋 加载技能指令，currentContactId:', currentContactId);
      const contact = contacts.find(c => c.id === currentContactId);
      const panelBody = document.getElementById('skill-panel-body');
      const panelTitle = document.getElementById('skill-panel-title');
      const tabsContainer = document.getElementById('skill-tabs');
      
      // 根据联系人类型获取对应的技能列表
      let skills = [];
      let categoryName = '';
      let categoryTabs = [];
      
      if (contact.skillCategory === 'project') {
        skills = projectSkills;
        categoryName = '项目管理技能';
        categoryTabs = [
          { id: 'all', name: '全部' },
          { id: 'requirement', name: '需求' },
          { id: 'task', name: '任务' },
          { id: 'iteration', name: '迭代' },
          { id: 'milestone', name: '里程碑' },
          { id: 'document', name: '文档' },
          { id: 'defect', name: '缺陷' },
          { id: 'risk', name: '风险' },
          { id: 'test', name: '测试' },
        ];
      } else if (contact.skillCategory === 'freelancer') {
        skills = freelancerSkills;
        categoryName = '自由职业者技能';
        categoryTabs = [
          { id: 'all', name: '全部' },
          { id: 'resume', name: '简历' },
          { id: 'freelancer', name: '职业' },
          { id: 'service', name: '服务' },
          { id: 'talent', name: '匹配' },
        ];
      } else if (contact.skillCategory === 'agent') {
        skills = agentSkills;
        categoryName = 'Agent 协作技能';
        categoryTabs = [
          { id: 'all', name: '全部' },
        ];
      }
      
      panelTitle.textContent = `${categoryName} (${skills.length}个工具)`;
      
      // 渲染标签页
      tabsContainer.innerHTML = categoryTabs.map(tab => 
        `<button class="skill-panel-tab ${tab.id === currentTab ? 'active' : ''}" onclick="switchTab('${tab.id}', this)">${tab.name}</button>`
      ).join('');
      
      // 渲染技能列表
      if (currentTab === 'all') {
        panelBody.innerHTML = `<div class="skill-category"><div class="skill-category-title">📋 ${categoryName}<span class="skill-count">${skills.length}个工具</span></div>${skills.map(cmd => renderCommandItem(cmd)).join('')}</div>`;
      } else {
        const filtered = skills.filter(s => s.category === currentTab);
        panelBody.innerHTML = `<div class="skill-category"><div class="skill-category-title">📋 ${currentTab}<span class="skill-count">${filtered.length}个工具</span></div>${filtered.map(cmd => renderCommandItem(cmd)).join('')}</div>`;

    function renderCommandItem(command) {
      return `<div class="command-item" onclick="selectCommand(${command.id})">
        <div class="command-item-icon">${command.icon}</div>
        <div class="command-item-content">
          <div class="command-item-header"><div class="command-item-title">${command.title}</div></div>
          <div class="command-item-code">${command.code}</div>
          <div class="command-item-desc">${command.desc}</div>
          <div class="command-item-tags">${command.tags.map(tag => `<span class="command-item-tag">${tag}</span>`).join('')}</div>
        </div>
      </div>`;
    }

    // 点击技能指令，调用真实 MCP API
    async function selectCommand(commandId) {
      console.log('🎯 点击技能指令:', commandId, 'currentContactId:', currentContactId);
      
      if (!currentContactId) { alert('请先选择一个联系人'); return; }
      
      const contact = contacts.find(c => c.id === currentContactId);
      let skills = [];
      if (contact.skillCategory === 'project') skills = projectSkills;
      else if (contact.skillCategory === 'freelancer') skills = freelancerSkills;
      else if (contact.skillCategory === 'agent') skills = agentSkills;
      
      const command = skills.find(c => c.id === commandId);
      console.log('📦 找到的指令:', command);
      if (!command) return;
      
      // 关闭面板
      document.getElementById('skill-panel').classList.remove('active');
      document.getElementById('skill-input-btn').classList.remove('active');
      
      // 初始化消息数组
      if (!messages[currentContactId]) messages[currentContactId] = [];
      
      // 创建指令消息
      const commandMsg = {
        id: Date.now(),
        sender: 'me',
        time: getTime(),
        type: 'command',
        command: { ...command, status: 'loading' }
      };
      
      messages[currentContactId].push(commandMsg);
      loadMessages(currentContactId);
      
      // 调用真实 MCP API
      await callMCPTool(command);
    }

    // 调用 uxin-mcp 技能服务
    async function callMCPTool(command) {
      const lastMsgIndex = messages[currentContactId].length - 1;
      console.log('⚙️ 调用 MCP 工具:', command.mcpTool, command.mcpParams);
      
      try {
        const response = await fetch('http://localhost:8000/api/v1/mcp/call-tool', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${authToken}`
          },
          body: JSON.stringify({
            tool_name: command.mcpTool,
            arguments: command.mcpParams || {}
          })
        });

        if (!response.ok) throw new Error(`MCP 调用失败：${response.status}`);

        const result = await response.json();
        console.log('✅ MCP 返回结果:', result);
        
        messages[currentContactId][lastMsgIndex].command.status = 'success';
        
        if (command.artifact === 'requirement-list' && result.success && result.data) {
          const artifactHtml = renderRequirementList(result.data);
          messages[currentContactId][lastMsgIndex].artifact = artifactHtml;
          messages[currentContactId].push({
            id: Date.now() + 1,
            sender: 'them',
            text: `✅ 已通过 uxin-mcp 查询到 ${result.data.length} 条需求，显示如上。`,
            time: getTime(),
            type: 'text'
          });
        } else if (command.artifact === 'task-list' && result.success && result.data) {
          const artifactHtml = renderTaskList(result.data);
          messages[currentContactId][lastMsgIndex].artifact = artifactHtml;
          messages[currentContactId].push({
            id: Date.now() + 1,
            sender: 'them',
            text: `✅ 已通过 uxin-mcp 查询到 ${result.data.length} 个任务，显示如上。`,
            time: getTime(),
            type: 'text'
          });
        } else {
          messages[currentContactId].push({
            id: Date.now() + 1,
            sender: 'them',
            text: `✅ 指令已执行：\n\`${command.code}\`\n\nMCP 返回：${JSON.stringify(result.data || result, null, 2).substring(0, 500)}`,
            time: getTime(),
            type: 'text'
          });
        }
      } catch (error) {
        console.error('❌ MCP 调用错误:', error);
        messages[currentContactId][lastMsgIndex].command.status = 'error';
        messages[currentContactId].push({
          id: Date.now() + 1,
          sender: 'them',
          text: `❌ MCP 调用失败：${error.message}`,
          time: getTime(),
          type: 'text'
        });
      }
      
      loadMessages(currentContactId);
    }

    function renderRequirementList(requirements) {
      if (!requirements || requirements.length === 0) return '<div style="padding:20px;text-align:center;color:var(--text3)">暂无需求数据</div>';
      return `<div style="background: white; border-radius: 8px; overflow: hidden;">
        <div style="padding: 16px 20px; background: #fafafa; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center;">
          <h2 style="font-size: 16px; font-weight: 600; color: #1f1f1f; display: flex; align-items: center; gap: 8px;">📋 全部需求</h2>
          <span style="font-size: 13px; color: #8c8c8c; background: #f5f5f5; padding: 4px 12px; border-radius: 20px;">${requirements.length} 条记录</span>
        </div>
        <div style="overflow-x: auto;">
          <table style="width: 100%; border-collapse: collapse; font-size: 14px; min-width: 800px;">
            <thead><tr><th style="background: #fafafa; padding: 14px 16px; text-align: left; font-weight: 500; color: #595959; border-bottom: 1px solid #f0f0f0;">标题</th><th style="background: #fafafa; padding: 14px 16px; text-align: left; font-weight: 500; color: #595959; border-bottom: 1px solid #f0f0f0;">状态</th><th style="background: #fafafa; padding: 14px 16px; text-align: left; font-weight: 500; color: #595959; border-bottom: 1px solid #f0f0f0;">优先级</th><th style="background: #fafafa; padding: 14px 16px; text-align: left; font-weight: 500; color: #595959; border-bottom: 1px solid #f0f0f0;">负责人</th><th style="background: #fafafa; padding: 14px 16px; text-align: left; font-weight: 500; color: #595959; border-bottom: 1px solid #f0f0f0;">创建时间</th></tr></thead>
            <tbody>${requirements.map(req => `<tr style="border-bottom: 1px solid #f0f0f0;"><td style="padding: 14px 16px; color: #262626; font-weight: 500;">${req.title || '未命名需求'}</td><td style="padding: 14px 16px;"><span style="display: inline-block; padding: 4px 10px; border-radius: 30px; font-size: 12px; font-weight: 500; ${getStatusStyle(req.status)}">${getStatusLabel(req.status)}</span></td><td style="padding: 14px 16px;"><span style="display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; ${getPriorityStyle(req.priority)}"><span style="width: 6px; height: 6px; border-radius: 50%; ${getPriorityDot(req.priority)}"></span>${getPriorityLabel(req.priority)}</span></td><td style="padding: 14px 16px; color: #262626;">${req.assigneeId || '—'}</td><td style="padding: 14px 16px; color: #595959; font-size: 13px;">${formatDate(req.createdAt)}</td></tr>`).join('')}</tbody>
          </table>
        </div>
      </div>`;
    }

    function renderTaskList(tasks) {
      if (!tasks || tasks.length === 0) return '<div style="padding:20px;text-align:center;color:var(--text3)">暂无任务数据</div>';
      return `<div style="background: white; border-radius: 8px; overflow: hidden;">
        <div style="padding: 16px 20px; background: #fafafa; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center;">
          <h2 style="font-size: 16px; font-weight: 600; color: #1f1f1f; display: flex; align-items: center; gap: 8px;">✅ 全部任务</h2>
          <span style="font-size: 13px; color: #8c8c8c; background: #f5f5f5; padding: 4px 12px; border-radius: 20px;">${tasks.length} 条记录</span>
        </div>
        <div style="overflow-x: auto;">
          <table style="width: 100%; border-collapse: collapse; font-size: 14px; min-width: 800px;">
            <thead><tr><th style="background: #fafafa; padding: 14px 16px; text-align: left; font-weight: 500; color: #595959; border-bottom: 1px solid #f0f0f0;">标题</th><th style="background: #fafafa; padding: 14px 16px; text-align: left; font-weight: 500; color: #595959; border-bottom: 1px solid #f0f0f0;">状态</th><th style="background: #fafafa; padding: 14px 16px; text-align: left; font-weight: 500; color: #595959; border-bottom: 1px solid #f0f0f0;">进度</th><th style="background: #fafafa; padding: 14px 16px; text-align: left; font-weight: 500; color: #595959; border-bottom: 1px solid #f0f0f0;">负责人</th></tr></thead>
            <tbody>${tasks.map(task => `<tr style="border-bottom: 1px solid #f0f0f0;"><td style="padding: 14px 16px; color: #262626; font-weight: 500;">${task.title || '未命名任务'}</td><td style="padding: 14px 16px;"><span style="display: inline-block; padding: 4px 10px; border-radius: 30px; font-size: 12px; font-weight: 500; ${getStatusStyle(task.status)}">${getStatusLabel(task.status)}</span></td><td style="padding: 14px 16px;"><span style="color: #595959;">${task.progress || 0}%</span></td><td style="padding: 14px 16px; color: #262626;">${task.assigneeId || '—'}</td></tr>`).join('')}</tbody>
          </table>
        </div>
      </div>`;
    }

    function getStatusStyle(status) { const s = (status || 'PENDING').toUpperCase(); const styles = { 'PENDING': 'background: #fff7e6; color: #d46b08; border: 1px solid #ffd591;', 'IN_PROGRESS': 'background: #e6f7ff; color: #096dd9; border: 1px solid #91d5ff;', 'COMPLETED': 'background: #f6ffed; color: #389e0d; border: 1px solid #b7eb8f;' }; return styles[s] || styles['PENDING']; }
    function getStatusLabel(status) { const s = (status || 'PENDING').toUpperCase(); const labels = { 'PENDING': '待处理', 'IN_PROGRESS': '进行中', 'COMPLETED': '已完成' }; return labels[s] || s; }
    function getPriorityStyle(priority) { const p = (priority || 'MEDIUM').toUpperCase(); const styles = { 'HIGH': 'background: #fff7e6; color: #d46b08;', 'MEDIUM': 'background: #f0f5ff; color: #2f54eb;', 'LOW': 'background: #f6ffed; color: #389e0d;' }; return styles[p] || styles['MEDIUM']; }
    function getPriorityLabel(priority) { const p = (priority || 'MEDIUM').toUpperCase(); const labels = { 'HIGH': '高', 'MEDIUM': '中', 'LOW': '低' }; return labels[p] || p; }
    function getPriorityDot(priority) { const p = (priority || 'MEDIUM').toUpperCase(); const colors = { 'HIGH': 'background: #faad14;', 'MEDIUM': 'background: #2f54eb;', 'LOW': 'background: #52c41a;' }; return colors[p] || colors['MEDIUM']; }
    function formatDate(dateStr) { if (!dateStr) return '-'; return new Date(dateStr).toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' }); }
    function getTime() { return new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }); }

    function sendMessage() {
      const input = document.getElementById('message-input');
      const text = input.value.trim();
      if (!text || !currentContactId) return;
      if (!messages[currentContactId]) messages[currentContactId] = [];
      messages[currentContactId].push({ id: Date.now(), sender: 'me', text: text, time: getTime(), type: 'text' });
      input.value = ''; input.style.height = 'auto';
      loadMessages(currentContactId);
      setTimeout(() => { messages[currentContactId].push({ id: Date.now() + 1, sender: 'them', text: '收到您的消息，我正在处理...', time: getTime(), type: 'text' }); loadMessages(currentContactId); }, 1000);
    }

    function handleKeyDown(event) { if (event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); } }
    function autoResize(textarea) { textarea.style.height = 'auto'; textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px'; }
    function filterContacts() { loadContacts(document.getElementById('search-input').value); }

    document.addEventListener('click', function(event) {
      const panel = document.getElementById('skill-panel');
      const btn = document.getElementById('skill-input-btn');
      if (!panel.contains(event.target) && !btn.contains(event.target)) { panel.classList.remove('active'); btn.classList.remove('active'); }
    });

    async function init() {
      try {
        const res = await fetch('http://localhost:8000/api/v1/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email: 'test@uxin.com', password: 'test123' }) });
        const data = await res.json();
        if (data.success) { authToken = data.data.token; console.log('✅ 获取认证 token 成功'); }
      } catch (error) { console.error('❌ 获取 token 失败:', error); }
      loadContacts();
      console.log('🚀 页面初始化完成');
    }

    init();
  </script>
</body>
</html>
