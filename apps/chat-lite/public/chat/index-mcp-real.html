<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天沟通 · ChatLite (真实 MCP 集成)</title>
<style>
:root {
  --bg: #0d0f14; --bg2: #131620; --bg3: #1a1e2e; --bg4: #1f2435;
  --panel: #161a27; --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.1);
  --accent: #4f8ef7; --accent2: #6ee7b7; --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
  --online: #22d3ee; --robot: #a78bfa; --robot-bg: rgba(167,139,250,0.12);
  --user-msg: #1e3a5f; --other-msg: #1a1e2e; --radius: 14px;
  --font: -apple-system, BlinkMacSystemFont, 'Noto Sans SC', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; font-size: 14px; }
.sidebar { width: 280px; min-width: 280px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.sidebar-header { padding: 20px 18px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
.logo-mark { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), var(--robot)); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.logo-text { font-size: 13px; font-weight: 600; color: var(--text); }
.logo-text span { color: var(--text3); font-weight: 400; font-size: 11px; display: block; }
.sidebar-search { padding: 12px 14px; border-bottom: 1px solid var(--border); }
.search-input-wrap { position: relative; }
.search-input-wrap svg { position: absolute; left: 10px; color: var(--text3); width: 14px; height: 14px; }
.search-input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 7px 10px 7px 32px; color: var(--text); font-size: 13px; outline: none; }
.search-input:focus { border-color: var(--accent); }
.contact-list { flex: 1; overflow-y: auto; padding: 8px 0; }
.contact-group-label { padding: 8px 16px 4px; font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; }
.contact-item { display: flex; align-items: center; gap: 11px; padding: 10px 14px; cursor: pointer; border-radius: 10px; margin: 1px 6px; transition: background 0.2s; }
.contact-item:hover { background: var(--bg3); }
.contact-item.active { background: rgba(79,142,247,0.15); }
.avatar { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; position: relative; }
.avatar.robot { background: var(--robot-bg); color: var(--robot); }
.avatar.user-a { background: linear-gradient(135deg, #1e40af, #3b82f6); color: #fff; }
.status-dot { position: absolute; bottom: -1px; right: -1px; width: 9px; height: 9px; border-radius: 50%; background: var(--online); border: 2px solid var(--panel); }
.contact-info { flex: 1; min-width: 0; }
.contact-name { font-size: 13px; font-weight: 500; color: var(--text); }
.contact-preview { font-size: 11.5px; color: var(--text3); margin-top: 1px; }
.badge { font-size: 10px; font-weight: 600; padding: 1px 5px; border-radius: 4px; background: var(--robot-bg); color: var(--robot); }
.badge.ai { background: rgba(79,142,247,0.15); color: var(--accent); }
.badge.freelancer { background: rgba(110,231,183,0.15); color: var(--accent2); }
.contact-time { font-size: 10.5px; color: var(--text3); position: absolute; top: 10px; right: 14px; }
.chat-main { flex: 1; display: flex; flex-direction: column; background: var(--bg2); }
.chat-header { display: flex; align-items: center; padding: 0 20px; height: 64px; border-bottom: 1px solid var(--border); background: var(--panel); gap: 12px; }
.chat-header .avatar { width: 36px; height: 36px; font-size: 14px; }
.chat-title { flex: 1; }
.chat-title h3 { font-size: 14px; font-weight: 600; }
.chat-title p { font-size: 12px; color: var(--text3); margin-top: 1px; }
.header-actions { display: flex; gap: 6px; }
.icon-btn { width: 32px; height: 32px; border-radius: 8px; border: none; background: transparent; color: var(--text2); cursor: pointer; }
.icon-btn:hover { background: var(--bg3); color: var(--text); }
.chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
.day-divider { display: flex; align-items: center; gap: 12px; color: var(--text3); font-size: 11px; }
.day-divider::before, .day-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.msg-group { display: flex; gap: 10px; animation: fadeIn 0.2s ease; }
.msg-group.self { flex-direction: row-reverse; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.msg-group .avatar { width: 32px; height: 32px; font-size: 12px; border-radius: 8px; }
.msg-content { max-width: 65%; display: flex; flex-direction: column; gap: 4px; }
.msg-sender { font-size: 11.5px; color: var(--text3); padding: 0 4px; }
.msg-bubble { background: var(--other-msg); border: 1px solid var(--border); border-radius: 4px 14px 14px 14px; padding: 10px 14px; font-size: 13.5px; line-height: 1.6; }
.msg-group.self .msg-bubble { background: var(--user-msg); border-color: rgba(79,142,247,0.2); border-radius: 14px 4px 14px 14px; }
.msg-bubble.robot-msg { background: var(--robot-bg); border-color: rgba(167,139,250,0.25); }
.msg-bubble.command-msg { background: rgba(79,142,247,0.15); border-color: var(--accent); font-family: var(--mono); font-size: 12.5px; }
.msg-time { font-size: 10.5px; color: var(--text3); padding: 0 4px; }
.command-card { background: var(--bg4); border: 1px solid var(--accent); border-radius: 12px; padding: 14px 16px; max-width: 360px; }
.command-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.command-card-header svg { color: var(--accent2); width: 16px; height: 16px; }
.command-card-header span { font-size: 13px; font-weight: 600; color: var(--accent2); font-family: var(--mono); }
.command-card-code { font-family: var(--mono); font-size: 12px; color: var(--accent); background: var(--bg3); padding: 8px 10px; border-radius: 6px; margin-bottom: 8px; word-break: break-all; }
.command-card-desc { font-size: 12px; color: var(--text3); }
.command-card-status { font-size: 11.5px; color: var(--text3); margin-top: 8px; }
.command-card-status.loading { color: var(--accent); }
.command-card-status.success { color: var(--accent2); }
.chat-input-area { padding: 14px 20px; border-top: 1px solid var(--border); background: var(--panel); flex-shrink: 0; }
.input-wrap { display: flex; align-items: flex-end; gap: 12px; }
#skill-input-btn { width: 36px; height: 36px; border-radius: 8px; border: none; background: transparent; color: var(--text3); cursor: pointer; flex-shrink: 0; }
#skill-input-btn:hover { background: var(--bg3); color: var(--text); }
#skill-input-btn.active { background: var(--accent); color: white; }
.message-input { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; color: var(--text); font-size: 13.5px; resize: none; max-height: 120px; min-height: 44px; outline: none; }
.message-input:focus { border-color: var(--accent); }
.send-btn { width: 44px; height: 44px; border-radius: 12px; border: none; background: var(--accent); color: white; cursor: pointer; flex-shrink: 0; }
.send-btn:hover { background: #3b82f6; }
.empty-chat { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text3); }
.empty-chat svg { width: 64px; height: 64px; margin-bottom: 16px; opacity: 0.5; }
.empty-chat h3 { font-size: 16px; margin-bottom: 8px; color: var(--text2); }
.skill-panel { position: absolute; bottom: 0; left: 20px; width: 400px; background: var(--panel); border: 1px solid var(--border2); border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); z-index: 100; display: none; flex-direction: column; max-height: 450px; overflow: hidden; }
.skill-panel.active { display: flex; }
.skill-panel-header { padding: 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.skill-panel-header h4 { font-size: 14px; font-weight: 600; }
.skill-panel-close { width: 28px; height: 28px; border-radius: 6px; border: none; background: transparent; color: var(--text2); cursor: pointer; }
.skill-panel-close:hover { background: var(--bg3); color: var(--text); }
.skill-panel-body { flex: 1; overflow-y: auto; padding: 16px; }
.skill-loading { text-align: center; padding: 40px 20px; color: var(--text3); }
.skill-loading svg { width: 32px; height: 32px; margin: 0 auto 12px; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.command-item { background: var(--bg4); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; }
.command-item:hover { border-color: var(--accent); background: var(--bg3); transform: translateX(2px); }
.command-item-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.command-item-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--robot-bg); display: flex; align-items: center; justify-content: center; font-size: 16px; }
.command-item-title { font-size: 13.5px; font-weight: 600; color: var(--text); flex: 1; }
.command-item-code { font-family: var(--mono); font-size: 11.5px; color: var(--accent); background: var(--bg3); padding: 8px 10px; border-radius: 6px; margin-bottom: 8px; }
.command-item-desc { font-size: 12px; color: var(--text3); line-height: 1.5; }
.command-item-tags { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.command-item-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--bg3); color: var(--text2); }
</style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo-mark">🤖</div>
      <div class="logo-text">ChatLite<span>机器人技能共享平台</span></div>
    </div>
    <div class="sidebar-search">
      <div class="search-input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" class="search-input" placeholder="搜索联系人..." id="search-input" oninput="filterContacts()">
      </div>
    </div>
    <div class="contact-list" id="contact-list"><div class="contact-group-label">机器人</div></div>
  </div>
  <div class="chat-main">
    <div class="chat-header" id="chat-header" style="display: none;">
      <div class="avatar robot" id="chat-avatar">🤖</div>
      <div class="chat-title">
        <h3 id="chat-with-name"><span class="badge ai">AI</span><span>Assistant</span></h3>
        <p id="chat-status">在线</p>
      </div>
      <div class="header-actions">
        <button class="icon-btn" title="搜索"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
        <button class="icon-btn" title="更多"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg></button>
      </div>
    </div>
    <div class="chat-messages" id="chat-messages" style="display: none;"></div>
    <div class="empty-chat" id="empty-chat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <h3>选择联系人开始聊天</h3>
      <p>从左侧列表选择一个联系人或机器人</p>
    </div>
    <div class="chat-input-area" id="input-area" style="display: none;">
      <div class="input-wrap">
        <button id="skill-input-btn" onclick="toggleSkillPanel()" title="技能指令">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
        </button>
        <textarea class="message-input" id="message-input" placeholder="输入消息或指令..." rows="1" onkeydown="handleKeyDown(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
    <div class="skill-panel" id="skill-panel">
      <div class="skill-panel-header">
        <h4>📋 技能指令 (uxin-mcp)</h4>
        <button class="skill-panel-close" onclick="toggleSkillPanel()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="skill-panel-body" id="skill-panel-body">
        <div class="skill-loading">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>
          <p>正在通过 uxin-mcp 获取技能指令...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const contacts = [
      { id: 'bot-1', name: 'AI Assistant', type: 'robot', preview: '有什么可以帮您？', time: '刚刚', unread: 0, online: true, group: 'robot' },
      { id: 'bot-2', name: '自由职业者助手', type: 'robot', preview: '已为您匹配 3 位专家', time: '5 分钟前', unread: 2, online: true, group: 'robot', isFreelancerBot: true },
      { id: 'bot-3', name: '项目管理', type: 'robot', preview: '项目进度已更新', time: '1 小时前', unread: 0, online: true, group: 'robot' },
      { id: 'user-1', name: '张三', type: 'user-a', preview: '好的，我稍后处理', time: '10 分钟前', unread: 0, online: true, group: 'user', isFreelancer: true },
      { id: 'user-2', name: '李四', type: 'user-b', preview: '会议改到明天', time: '1 小时前', unread: 5, online: false, group: 'user', isFreelancer: false },
    ];

    const messages = {
      'bot-1': [{ id: 1, sender: 'them', text: '您好！我是 AI 助手，有什么可以帮您？', time: '09:00', type: 'text' }],
      'bot-3': [{ id: 1, sender: 'them', text: '您好！我是项目管理助手。', time: '10:00', type: 'text' }],
    };

    // 技能指令配置 - 对应 uxin-mcp 中的工具
    const collaborationCommands = [
      { id: 1, title: '查询需求列表', icon: '📋', code: '/requirement list --project=proj-uxin', desc: '调用 uxin-mcp requirement_list 工具查询项目需求', tags: ['需求', '查询'], mcpTool: 'requirement_list', mcpParams: { project_id: 'proj-uxin' } },
      { id: 2, title: '创建项目协作', icon: '🤝', code: '/collaboration create --project={id}', desc: '调用 uxin-mcp collaboration_create 工具', tags: ['协作', '创建'], mcpTool: 'collaboration_create', mcpParams: {} },
      { id: 3, title: '查看协作者列表', icon: '👥', code: '/collaboration members --project={id}', desc: '调用 uxin-mcp collaboration_members 工具', tags: ['协作', '查询'], mcpTool: 'collaboration_members', mcpParams: {} },
      { id: 4, title: '分配任务', icon: '📋', code: '/task assign --task={id}', desc: '调用 uxin-mcp task_assign 工具', tags: ['任务', '分配'], mcpTool: 'task_assign', mcpParams: {} },
    ];

    let currentContactId = null;
    let authToken = '';

    function loadContacts(filter = '') {
      const container = document.getElementById('contact-list');
      const filtered = contacts.filter(c => c.name.toLowerCase().includes(filter.toLowerCase()));
      const robots = filtered.filter(c => c.group === 'robot');
      const users = filtered.filter(c => c.group === 'user');
      let html = '<div class="contact-group-label">机器人</div>';
      html += robots.map(contact => renderContactItem(contact)).join('');
      if (users.length > 0) {
        html += '<div class="contact-group-label">人类专家</div>';
        html += users.map(contact => renderContactItem(contact)).join('');
      }
      container.innerHTML = html;
    }

    function renderContactItem(contact) {
      return `<div class="contact-item ${contact.id === currentContactId ? 'active' : ''}" onclick="selectContact('${contact.id}')">
        <div class="avatar ${contact.type}">${contact.type.startsWith('user') ? contact.name.charAt(0) : '🤖'}${contact.online ? '<div class="status-dot"></div>' : ''}</div>
        <div class="contact-info">
          <div class="contact-name">${contact.name}${contact.type === 'robot' ? '<span class="badge ai">AI</span>' : ''}${contact.isFreelancer ? '<span class="badge freelancer">自由职业</span>' : ''}</div>
          <div class="contact-preview">${contact.preview}</div>
        </div>
        ${contact.unread > 0 ? `<div class="unread-count">${contact.unread}</div>` : ''}
        <div class="contact-time">${contact.time}</div>
      </div>`;
    }

    function selectContact(id) {
      currentContactId = id;
      const contact = contacts.find(c => c.id === id);
      document.getElementById('empty-chat').style.display = 'none';
      document.getElementById('chat-header').style.display = 'flex';
      document.getElementById('chat-messages').style.display = 'flex';
      document.getElementById('input-area').style.display = 'flex';
      document.getElementById('chat-with-name').innerHTML = `${contact.type === 'robot' ? '<span class="badge ai">AI</span>' : ''}${contact.isFreelancer ? '<span class="badge freelancer">自由职业</span>' : ''}<span>${contact.name}</span>`;
      document.getElementById('chat-status').textContent = contact.online ? '在线' : '离线';
      document.getElementById('chat-avatar').className = `avatar ${contact.type}`;
      document.getElementById('chat-avatar').textContent = contact.type.startsWith('user') ? contact.name.charAt(0) : '🤖';
      loadMessages(id);
      loadContacts(document.getElementById('search-input').value);
      document.getElementById('skill-panel').classList.remove('active');
      document.getElementById('skill-input-btn').classList.remove('active');
    }

    function loadMessages(contactId) {
      const container = document.getElementById('chat-messages');
      const msgs = messages[contactId] || [];
      if (msgs.length === 0) { container.innerHTML = '<div style="text-align: center; color: var(--text3); padding: 40px;">暂无消息</div>'; return; }
      container.innerHTML = `<div class="day-divider">今天</div>${msgs.map(msg => renderMessage(msg, contactId)).join('')}`;
      container.scrollTop = container.scrollHeight;
    }

    function renderMessage(msg, contactId) {
      const contact = contacts.find(c => c.id === contactId);
      const isSelf = msg.sender === 'me';
      if (msg.type === 'command') {
        return `<div class="msg-group ${isSelf ? 'self' : ''}">
          <div class="avatar ${isSelf ? 'user-a' : 'robot'}">${isSelf ? '我' : '🤖'}</div>
          <div class="msg-content">
            ${!isSelf ? `<div class="msg-sender">${contact.name}</div>` : ''}
            <div class="msg-bubble command-msg">
              <div class="command-card">
                <div class="command-card-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg><span>${msg.command.title}</span></div>
                <div class="command-card-code">${msg.command.code}</div>
                <div class="command-card-desc">${msg.command.desc}</div>
                <div class="command-card-status ${msg.command.status || 'success'}">${msg.command.status === 'error' ? '❌ 执行失败' : msg.command.status === 'loading' ? '⏳ 调用 uxin-mcp 中...' : '✅ 已发送指令'}</div>
              </div>
              ${msg.artifact ? `<div style="margin-top: 12px;">${msg.artifact}</div>` : ''}
            </div>
            <div class="msg-time">${msg.time}</div>
          </div>
        </div>`;
      }
      return `<div class="msg-group ${isSelf ? 'self' : ''}">
        <div class="avatar ${isSelf ? 'user-a' : contact.type === 'robot' ? 'robot' : 'user-a'}">${isSelf ? '我' : (contact.type === 'robot' ? '🤖' : contact.name.charAt(0))}</div>
        <div class="msg-content">
          ${!isSelf ? `<div class="msg-sender">${contact.name}</div>` : ''}
          <div class="msg-bubble ${contact.type === 'robot' && !isSelf ? 'robot-msg' : ''}">${msg.text}</div>
          <div class="msg-time">${msg.time}</div>
        </div>
      </div>`;
    }

    function toggleSkillPanel() {
      const panel = document.getElementById('skill-panel');
      if (!currentContactId) { alert('请先选择一个联系人'); return; }
      const isActive = panel.classList.contains('active');
      panel.classList.toggle('active');
      document.getElementById('skill-input-btn').classList.toggle('active');
      if (panel.classList.contains('active') && !isActive) loadSkillCommands();
    }

    async function loadSkillCommands() {
      const panelBody = document.getElementById('skill-panel-body');
      panelBody.innerHTML = `<div class="skill-loading"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg><p>正在通过 uxin-mcp 获取技能指令...</p></div>`;
      await new Promise(resolve => setTimeout(resolve, 800));
      panelBody.innerHTML = collaborationCommands.map(cmd => renderCommandItem(cmd)).join('');
    }

    function renderCommandItem(command) {
      return `<div class="command-item" onclick="selectCommand(${command.id})">
        <div class="command-item-header"><div class="command-item-icon">${command.icon}</div><div class="command-item-title">${command.title}</div></div>
        <div class="command-item-code">${command.code}</div>
        <div class="command-item-desc">${command.desc}</div>
        <div class="command-item-tags">${command.tags.map(tag => `<span class="command-item-tag">${tag}</span>`).join('')}</div>
      </div>`;
    }

    async function selectCommand(commandId) {
      const command = collaborationCommands.find(c => c.id === commandId);
      if (!command) return;
      document.getElementById('skill-panel').classList.remove('active');
      document.getElementById('skill-input-btn').classList.remove('active');
      if (!messages[currentContactId]) messages[currentContactId] = [];
      messages[currentContactId].push({
        id: Date.now(), sender: 'me',
        time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }),
        type: 'command',
        command: { ...command, status: 'loading' }
      });
      loadMessages(currentContactId);
      await executeMCPCommand(command);
    }

    // 真实调用 uxin-mcp 技能服务
    async function executeMCPCommand(command) {
      const lastMsgIndex = messages[currentContactId].length - 1;
      try {
        // 调用 OpenClaw Gateway 的 MCP 工具
        const response = await fetch('http://localhost:8000/api/v1/mcp/call-tool', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${authToken}`
          },
          body: JSON.stringify({
            tool_name: command.mcpTool,
            arguments: command.mcpParams
          })
        });

        if (!response.ok) throw new Error(`MCP 调用失败：${response.status}`);

        const result = await response.json();
        
        // 更新指令状态为成功
        messages[currentContactId][lastMsgIndex].command.status = 'success';
        
        // 根据 MCP 返回结果渲染 Artifact
        if (command.mcpTool === 'requirement_list' && result.success && result.data) {
          const artifactHtml = renderRequirementList(result.data);
          messages[currentContactId][lastMsgIndex].artifact = artifactHtml;
          
          messages[currentContactId].push({
            id: Date.now() + 1, sender: 'them',
            text: `✅ 已通过 uxin-mcp 查询到 ${result.data.length} 条需求，显示如上。`,
            time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }),
            type: 'text'
          });
        } else {
          messages[currentContactId].push({
            id: Date.now() + 1, sender: 'them',
            text: `✅ 指令已执行：\n\`${command.code}\`\n\nMCP 返回：${JSON.stringify(result, null, 2)}`,
            time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }),
            type: 'text'
          });
        }
      } catch (error) {
        console.error('MCP 调用错误:', error);
        messages[currentContactId][lastMsgIndex].command.status = 'error';
        messages[currentContactId].push({
          id: Date.now() + 1, sender: 'them',
          text: `❌ MCP 调用失败：${error.message}\n\n请确保：\n1. OpenClaw Gateway 正在运行\n2. uxin-mcp 技能服务已加载\n3. API 认证 token 有效`,
          time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }),
          type: 'text'
        });
      }
      loadMessages(currentContactId);
    }

    // 渲染需求列表 Artifact（从 MCP 返回的真实数据）
    function renderRequirementList(requirements) {
      if (!requirements || requirements.length === 0) return '<div style="padding: 20px; text-align: center; color: var(--text3);">暂无需求数据</div>';
      return `<div style="background: white; border-radius: 8px; overflow: hidden;">
        <div style="padding: 16px 20px; background: #fafafa; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center;">
          <h2 style="font-size: 16px; font-weight: 600; color: #1f1f1f; display: flex; align-items: center; gap: 8px;">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M3 6H17M3 10H13M3 14H9" stroke="#52c41a" stroke-width="1.8" stroke-linecap="round"/><circle cx="16" cy="14" r="2" stroke="#52c41a" stroke-width="1.8"/></svg>
            全部需求
          </h2>
          <span style="font-size: 13px; color: #8c8c8c; background: #f5f5f5; padding: 4px 12px; border-radius: 20px;">${requirements.length} 条记录</span>
        </div>
        <div style="overflow-x: auto;">
          <table style="width: 100%; border-collapse: collapse; font-size: 14px; min-width: 800px;">
            <thead><tr>
              <th style="background: #fafafa; padding: 14px 16px; text-align: left; font-weight: 500; color: #595959; border-bottom: 1px solid #f0f0f0;">标题</th>
              <th style="background: #fafafa; padding: 14px 16px; text-align: left; font-weight: 500; color: #595959; border-bottom: 1px solid #f0f0f0;">状态</th>
              <th style="background: #fafafa; padding: 14px 16px; text-align: left; font-weight: 500; color: #595959; border-bottom: 1px solid #f0f0f0;">优先级</th>
              <th style="background: #fafafa; padding: 14px 16px; text-align: left; font-weight: 500; color: #595959; border-bottom: 1px solid #f0f0f0;">负责人</th>
              <th style="background: #fafafa; padding: 14px 16px; text-align: left; font-weight: 500; color: #595959; border-bottom: 1px solid #f0f0f0;">创建时间</th>
            </tr></thead>
            <tbody>${requirements.map(req => `
              <tr style="border-bottom: 1px solid #f0f0f0;">
                <td style="padding: 14px 16px; color: #262626; font-weight: 500;">${req.title || '未命名需求'}</td>
                <td style="padding: 14px 16px;"><span style="display: inline-block; padding: 4px 10px; border-radius: 30px; font-size: 12px; font-weight: 500; ${getStatusStyle(req.status)}">${getStatusLabel(req.status)}</span></td>
                <td style="padding: 14px 16px;"><span style="display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; ${getPriorityStyle(req.priority)}"><span style="width: 6px; height: 6px; border-radius: 50%; ${getPriorityDot(req.priority)}"></span>${getPriorityLabel(req.priority)}</span></td>
                <td style="padding: 14px 16px; color: #262626;">${req.assigneeId || '—'}</td>
                <td style="padding: 14px 16px; color: #595959; font-size: 13px;">${formatDate(req.createdAt)}</td>
              </tr>
            `).join('')}</tbody>
          </table>
        </div>
      </div>`;
    }

    function getStatusStyle(status) {
      const s = (status || 'PENDING').toUpperCase();
      const styles = { 'PENDING': 'background: #fff7e6; color: #d46b08;', 'IN_PROGRESS': 'background: #e6f7ff; color: #096dd9;', 'COMPLETED': 'background: #f6ffed; color: #389e0d;' };
      return styles[s] || styles['PENDING'];
    }
    function getStatusLabel(status) {
      const s = (status || 'PENDING').toUpperCase();
      const labels = { 'PENDING': '待处理', 'IN_PROGRESS': '进行中', 'COMPLETED': '已完成' };
      return labels[s] || s;
    }
    function getPriorityStyle(priority) {
      const p = (priority || 'MEDIUM').toUpperCase();
      const styles = { 'HIGH': 'background: #fff7e6; color: #d46b08;', 'MEDIUM': 'background: #f0f5ff; color: #2f54eb;', 'LOW': 'background: #f6ffed; color: #389e0d;' };
      return styles[p] || styles['MEDIUM'];
    }
    function getPriorityLabel(priority) {
      const p = (priority || 'MEDIUM').toUpperCase();
      const labels = { 'HIGH': '高', 'MEDIUM': '中', 'LOW': '低' };
      return labels[p] || p;
    }
    function getPriorityDot(priority) {
      const p = (priority || 'MEDIUM').toUpperCase();
      const colors = { 'HIGH': 'background: #faad14;', 'MEDIUM': 'background: #2f54eb;', 'LOW': 'background: #52c41a;' };
      return colors[p] || colors['MEDIUM'];
    }
    function formatDate(dateStr) {
      if (!dateStr) return '-';
      return new Date(dateStr).toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' });
    }

    function sendMessage() {
      const input = document.getElementById('message-input');
      const text = input.value.trim();
      if (!text || !currentContactId) return;
      if (!messages[currentContactId]) messages[currentContactId] = [];
      messages[currentContactId].push({ id: Date.now(), sender: 'me', text: text, time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }), type: 'text' });
      input.value = ''; input.style.height = 'auto';
      loadMessages(currentContactId);
      setTimeout(() => {
        messages[currentContactId].push({ id: Date.now() + 1, sender: 'them', text: '收到您的消息，我正在处理...', time: new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }), type: 'text' });
        loadMessages(currentContactId);
      }, 1000);
    }

    function handleKeyDown(event) {
      if (event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); }
    }

    function autoResize(textarea) {
      textarea.style.height = 'auto';
      textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
    }

    function filterContacts() {
      loadContacts(document.getElementById('search-input').value);
    }

    document.addEventListener('click', function(event) {
      const panel = document.getElementById('skill-panel');
      const btn = document.getElementById('skill-input-btn');
      if (!panel.contains(event.target) && !btn.contains(event.target)) {
        panel.classList.remove('active');
        btn.classList.remove('active');
      }
    });

    // 初始化时获取认证 token
    async function init() {
      try {
        const res = await fetch('http://localhost:8000/api/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: 'test@uxin.com', password: 'test123' })
        });
        const data = await res.json();
        if (data.success) {
          authToken = data.data.token;
          console.log('✅ 获取认证 token 成功');
        }
      } catch (error) {
        console.error('❌ 获取 token 失败:', error);
      }
      loadContacts();
    }

    init();
  </script>
</body>
</html>
