<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>需求详情 - ChatLite</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #f5f5f5;
      padding: 20px;
      color: #262626;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    .header {
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 24px; color: #1f1f1f; }
    #status { font-size: 14px; }
    #status.success { color: #10b981; }
    #status.error { color: #ef4444; }
    
    /* 详情卡片 */
    .detail-card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    
    .detail-header {
      padding: 20px 24px;
      border-bottom: 1px solid #f0f0f0;
      background: #fafafa;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }
    .detail-title-section { flex: 1; }
    .detail-title {
      font-size: 18px;
      font-weight: 600;
      color: #1f1f1f;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .detail-title svg { color: #52c41a; }
    .detail-id { font-size: 12px; color: #8c8c8c; font-family: monospace; }
    
    .detail-actions { display: flex; gap: 8px; }
    .btn {
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-primary { background: #52c41a; color: white; border-color: #52c41a; }
    .btn-primary:hover { background: #73d13d; border-color: #73d13d; }
    .btn-default { background: white; color: #595959; border-color: #d9d9d9; }
    .btn-default:hover { color: #52c41a; border-color: #52c41a; }
    .btn-danger { background: #fff1f0; color: #cf1322; border-color: #ffa39c; }
    .btn-danger:hover { background: #ffccc7; border-color: #ff4d4f; }
    
    /* 标签页 */
    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid #f0f0f0;
      background: #fafafa;
    }
    .tab {
      padding: 12px 20px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 14px;
      color: #595959;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      position: relative;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .tab:hover { color: #52c41a; background: #f5f5f5; }
    .tab.active {
      color: #52c41a;
      border-bottom-color: #52c41a;
      background: white;
    }
    .tab-count {
      background: #f0f0f0;
      color: #595959;
      border-radius: 10px;
      padding: 1px 6px;
      font-size: 11px;
      min-width: 18px;
      text-align: center;
    }
    .tab.active .tab-count { background: #52c41a; color: white; }
    
    .tab-content { display: none; padding: 24px; }
    .tab-content.active { display: block; }
    
    /* 详情内容 */
    .section { margin-bottom: 24px; }
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #595959;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-title svg { color: #52c41a; }
    .section-content {
      padding: 16px;
      background: #fafafa;
      border-radius: 6px;
      border: 1px solid #f0f0f0;
    }
    .description {
      font-size: 14px;
      color: #262626;
      line-height: 1.8;
      white-space: pre-wrap;
    }
    
    /* 元数据网格 */
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    .meta-item { display: flex; flex-direction: column; gap: 6px; }
    .meta-label { font-size: 13px; color: #8c8c8c; }
    .meta-value {
      font-size: 14px;
      color: #262626;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 12px;
      font-weight: 500;
    }
    .status-pending, .status-draft { background: #fff7e6; color: #d46b08; border: 1px solid #ffd591; }
    .status-in_progress, .status-in-progress { background: #e6f7ff; color: #096dd9; border: 1px solid #91d5ff; }
    .status-completed, .status-approved { background: #f6ffed; color: #389e0d; border: 1px solid #b7eb8f; }
    .status-rejected { background: #fff1f0; color: #cf1322; border: 1px solid #ffa39c; }
    
    .priority-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }
    .priority-critical { background: #fff1f0; color: #cf1322; }
    .priority-high { background: #fff7e6; color: #d46b08; }
    .priority-medium { background: #f0f5ff; color: #2f54eb; }
    .priority-low { background: #f6ffed; color: #389e0d; }
    .priority-dot { width: 6px; height: 6px; border-radius: 50%; }
    .priority-critical .priority-dot { background: #ff4d4f; }
    .priority-high .priority-dot { background: #faad14; }
    .priority-medium .priority-dot { background: #2f54eb; }
    .priority-low .priority-dot { background: #52c41a; }
    
    .user-info { display: flex; align-items: center; gap: 8px; }
    .user-avatar {
      width: 24px; height: 24px;
      border-radius: 50%;
      background: #52c41a;
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 500;
    }
    .user-email { font-size: 13px; color: #262626; }
    .date-text { color: #595959; font-size: 13px; }
    
    /* 任务列表 */
    .task-list { list-style: none; }
    .task-item {
      padding: 16px;
      border: 1px solid #f0f0f0;
      border-radius: 6px;
      margin-bottom: 12px;
      transition: all 0.2s;
    }
    .task-item:hover {
      border-color: #52c41a;
      background: #f6ffed;
    }
    .task-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .task-title {
      font-size: 14px;
      font-weight: 500;
      color: #262626;
    }
    .task-status {
      font-size: 12px;
      padding: 2px 8px;
      border-radius: 4px;
      background: #f0f0f0;
      color: #595959;
    }
    .task-meta {
      font-size: 12px;
      color: #8c8c8c;
      display: flex;
      gap: 16px;
    }
    
    /* 活动日志时间线 */
    .timeline {
      position: relative;
      padding-left: 32px;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 8px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: #e8e8e8;
    }
    .timeline-item {
      position: relative;
      padding-bottom: 24px;
    }
    .timeline-item:last-child { padding-bottom: 0; }
    .timeline-dot {
      position: absolute;
      left: -28px;
      top: 4px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: white;
      border: 3px solid #52c41a;
      z-index: 1;
    }
    .timeline-item.create .timeline-dot { background: #52c41a; }
    .timeline-item.update .timeline-dot { background: #1890ff; border-color: #1890ff; }
    .timeline-item.comment .timeline-dot { background: #722ed1; border-color: #722ed1; }
    .timeline-content {
      background: #fafafa;
      padding: 12px 16px;
      border-radius: 6px;
      border: 1px solid #f0f0f0;
    }
    .timeline-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .timeline-title {
      font-size: 13px;
      font-weight: 500;
      color: #262626;
    }
    .timeline-time {
      font-size: 12px;
      color: #8c8c8c;
    }
    .timeline-description {
      font-size: 13px;
      color: #595959;
      line-height: 1.6;
    }
    
    .empty-state {
      padding: 40px 24px;
      text-align: center;
      color: #8c8c8c;
    }
    .empty-state svg { width: 48px; height: 48px; margin-bottom: 12px; color: #d9d9d9; }
    
    @media (max-width: 768px) {
      .meta-grid { grid-template-columns: 1fr; }
      .detail-header { flex-direction: column; }
      .detail-actions { width: 100%; justify-content: flex-end; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📄 需求详情</h1>
      <span id="status">加载中...</span>
    </div>
    
    <div class="detail-card">
      <div class="detail-header">
        <div class="detail-title-section">
          <div class="detail-title">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
              <path d="M3 6H17M3 10H13M3 14H9" stroke="#52c41a" stroke-width="1.8" stroke-linecap="round"/>
              <circle cx="16" cy="14" r="2" stroke="#52c41a" stroke-width="1.8"/>
            </svg>
            <span id="req-title">加载中...</span>
          </div>
          <div class="detail-id" id="req-id">ID: -</div>
        </div>
        <div class="detail-actions">
          <button class="btn btn-default" onclick="editRequirement()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
            </svg>
            编辑
          </button>
          <button class="btn btn-danger" onclick="deleteRequirement()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
            </svg>
            删除
          </button>
          <button class="btn btn-default" onclick="window.location.href='/test-requirement-list.html'">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            返回
          </button>
        </div>
      </div>
      
      <!-- 标签页 -->
      <div class="tabs">
        <button class="tab active" onclick="switchTab('details')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          详情
        </button>
        <button class="tab" onclick="switchTab('tasks')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
          </svg>
          任务
          <span class="tab-count" id="task-count">0</span>
        </button>
        <button class="tab" onclick="switchTab('activity')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
          活动
        </button>
      </div>
      
      <!-- 详情标签页 -->
      <div class="tab-content active" id="tab-details">
        <div class="section">
          <div class="section-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
            描述
          </div>
          <div class="section-content">
            <div class="description" id="req-description">暂无描述</div>
          </div>
        </div>
        
        <div class="section">
          <div class="section-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
            </svg>
            基本信息
          </div>
          <div class="section-content">
            <div class="meta-grid">
              <div class="meta-item">
                <span class="meta-label">状态</span>
                <span class="meta-value">
                  <span class="status-badge" id="req-status">待处理</span>
                </span>
              </div>
              <div class="meta-item">
                <span class="meta-label">优先级</span>
                <span class="meta-value">
                  <span class="priority-badge" id="req-priority">
                    <span class="priority-dot"></span>
                    中
                  </span>
                </span>
              </div>
              <div class="meta-item">
                <span class="meta-label">负责人</span>
                <span class="meta-value" id="req-assignee">
                  <span style="color:#bfbfbf">未分配</span>
                </span>
              </div>
              <div class="meta-item">
                <span class="meta-label">创建者</span>
                <span class="meta-value" id="req-reporter">
                  <span style="color:#bfbfbf">系统</span>
                </span>
              </div>
              <div class="meta-item">
                <span class="meta-label">创建时间</span>
                <span class="meta-value date-text" id="req-created">-</span>
              </div>
              <div class="meta-item">
                <span class="meta-label">更新时间</span>
                <span class="meta-value date-text" id="req-updated">-</span>
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <!-- 任务标签页 -->
      <div class="tab-content" id="tab-tasks">
        <div class="section">
          <div class="section-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
            </svg>
            关联任务
          </div>
          <ul class="task-list" id="task-list">
            <li class="empty-state">
              <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
              <p>暂无关联任务</p>
            </li>
          </ul>
        </div>
      </div>
      
      <!-- 活动标签页 -->
      <div class="tab-content" id="tab-activity">
        <div class="section">
          <div class="section-title">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
            </svg>
            变更历史
          </div>
          <div class="timeline" id="activity-timeline">
            <!-- 活动日志将通过 JS 动态加载 -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let authToken = '';
    let requirement = null;
    
    // 从 URL 获取需求 ID
    function getRequirementId() {
      const params = new URLSearchParams(window.location.search);
      return params.get('id');
    }
    
    // 登录获取 token
    async function login() {
      try {
        const res = await fetch('http://localhost:8000/api/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: 'test@uxin.com', password: 'test123' })
        });
        const data = await res.json();
        if (data.success) {
          authToken = data.data.token;
          return true;
        }
        return false;
      } catch (e) {
        console.error('Login error:', e);
        return false;
      }
    }
    
    // 加载需求详情
    async function loadRequirement() {
      const id = getRequirementId();
      if (!id) {
        document.getElementById('status').textContent = '❌ 缺少需求 ID';
        document.getElementById('status').className = 'error';
        return;
      }
      
      try {
        const res = await fetch(`http://localhost:8000/api/v1/project-requirements/${id}`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        const data = await res.json();
        
        if (data.success) {
          requirement = data.data;
          renderDetail();
          renderActivityLog();
          document.getElementById('status').textContent = '✅ 已加载';
          document.getElementById('status').className = 'success';
        } else {
          throw new Error(data.message || '加载失败');
        }
      } catch (e) {
        console.error('Load error:', e);
        document.getElementById('status').textContent = '❌ 加载失败';
        document.getElementById('status').className = 'error';
      }
    }
    
    // 渲染详情
    function renderDetail() {
      if (!requirement) return;
      
      document.getElementById('req-title').textContent = requirement.title;
      document.getElementById('req-id').textContent = `ID: ${requirement.id}`;
      document.getElementById('req-description').textContent = requirement.description || '暂无描述';
      
      // 状态
      const statusEl = document.getElementById('req-status');
      statusEl.textContent = getStatusLabel(requirement.status || 'PENDING');
      statusEl.className = `status-badge status-${(requirement.status || 'PENDING').toLowerCase().replace('_', '-')}`;
      
      // 优先级
      const priorityEl = document.getElementById('req-priority');
      const priority = (requirement.priority || 'MEDIUM').toLowerCase();
      priorityEl.className = `priority-badge priority-${priority}`;
      priorityEl.innerHTML = `<span class="priority-dot"></span>${getPriorityLabel(requirement.priority || 'MEDIUM')}`;
      
      // 负责人
      document.getElementById('req-assignee').innerHTML = requirement.assigneeId ? `
        <div class="user-info">
          <span class="user-avatar">${getUserInitial(requirement.assigneeId)}</span>
          <span class="user-email">${requirement.assigneeId}</span>
        </div>
      ` : '<span style="color:#bfbfbf">未分配</span>';
      
      // 创建者
      document.getElementById('req-reporter').innerHTML = requirement.reporterId ? `
        <div class="user-info">
          <span class="user-avatar">${getUserInitial(requirement.reporterId)}</span>
          <span class="user-email">${requirement.reporterId}</span>
        </div>
      ` : '<span style="color:#bfbfbf">系统</span>';
      
      // 时间
      document.getElementById('req-created').textContent = formatDateTime(requirement.createdAt);
      document.getElementById('req-updated').textContent = formatDateTime(requirement.updatedAt);
      
      // 渲染任务列表
      renderTasks();
    }
    
    // 渲染任务列表
    function renderTasks() {
      const tasks = requirement.tasks || [];
      document.getElementById('task-count').textContent = tasks.length;
      
      const taskList = document.getElementById('task-list');
      if (tasks.length === 0) {
        taskList.innerHTML = `
          <li class="empty-state">
            <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
            <p>暂无关联任务</p>
          </li>
        `;
        return;
      }
      
      taskList.innerHTML = tasks.map(task => `
        <li class="task-item">
          <div class="task-header">
            <span class="task-title">${task.title}</span>
            <span class="task-status">${getTaskStatusLabel(task.status)}</span>
          </div>
          <div class="task-meta">
            <span>负责人：${task.assigneeId || '未分配'}</span>
            <span>进度：${task.progress || 0}%</span>
            <span>创建：${formatDate(task.createdAt)}</span>
          </div>
        </li>
      `).join('');
    }
    
    // 渲染活动日志
    function renderActivityLog() {
      const timeline = document.getElementById('activity-timeline');
      
      // 生成模拟活动日志
      const activities = [
        {
          type: 'create',
          title: '需求创建',
          time: requirement.createdAt,
          description: `${requirement.reporterId || '系统'} 创建了需求`,
          user: requirement.reporterId || '系统'
        },
        {
          type: 'update',
          title: '状态更新',
          time: requirement.updatedAt,
          description: `状态更新为 ${getStatusLabel(requirement.status || 'PENDING')}`,
          user: '系统'
        }
      ];
      
      if (requirement.assigneeId) {
        activities.push({
          type: 'update',
          title: '负责人分配',
          time: requirement.updatedAt,
          description: `分配给 ${requirement.assigneeId}`,
          user: '系统'
        });
      }
      
      // 按时间排序
      activities.sort((a, b) => new Date(b.time) - new Date(a.time));
      
      timeline.innerHTML = activities.map(activity => `
        <div class="timeline-item ${activity.type}">
          <div class="timeline-dot"></div>
          <div class="timeline-content">
            <div class="timeline-header">
              <span class="timeline-title">${activity.title}</span>
              <span class="timeline-time">${formatDateTime(activity.time)}</span>
            </div>
            <div class="timeline-description">
              ${activity.description}
              <div style="margin-top: 4px; font-size: 12px; color: #8c8c8c;">操作人：${activity.user}</div>
            </div>
          </div>
        </div>
      `).join('');
    }
    
    // 切换标签页
    function switchTab(tabName) {
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      
      event.currentTarget.classList.add('active');
      document.getElementById(`tab-${tabName}`).classList.add('active');
    }
    
    // 辅助函数
    function getStatusLabel(status) {
      const map = {
        PENDING: '待处理', IN_PROGRESS: '进行中', COMPLETED: '已完成',
        REJECTED: '已拒绝', REVIEW: '审核中', DRAFT: '草稿'
      };
      return map[status] || status;
    }
    
    function getPriorityLabel(priority) {
      const map = { CRITICAL: '紧急', HIGH: '高', MEDIUM: '中', LOW: '低' };
      return map[priority] || priority;
    }
    
    function getTaskStatusLabel(status) {
      const map = {
        PENDING: '待处理', IN_PROGRESS: '进行中', COMPLETED: '已完成',
        CANCELLED: '已取消'
      };
      return map[status] || status;
    }
    
    function getUserInitial(email) {
      return email ? email.charAt(0).toUpperCase() : '?';
    }
    
    function formatDate(dateStr) {
      if (!dateStr) return '-';
      return new Date(dateStr).toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' });
    }
    
    function formatDateTime(dateStr) {
      if (!dateStr) return '-';
      return new Date(dateStr).toLocaleString('zh-CN');
    }
    
    // 操作函数
    function editRequirement() {
      alert('编辑功能：' + requirement?.id);
    }
    
    async function deleteRequirement() {
      if (!requirement) return;
      if (!confirm('确定要删除这个需求吗？')) return;
      
      try {
        const res = await fetch(`http://localhost:8000/api/v1/project-requirements/${requirement.id}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        const data = await res.json();
        
        if (data.success) {
          alert('✅ 需求已删除');
          window.location.href = '/test-requirement-list.html';
        } else {
          alert('❌ 删除失败：' + data.message);
        }
      } catch (e) {
        alert('❌ 删除失败：' + e.message);
      }
    }
    
    // 初始化
    async function init() {
      const success = await login();
      if (success) {
        await loadRequirement();
      } else {
        document.getElementById('status').textContent = '❌ 登录失败';
        document.getElementById('status').className = 'error';
      }
    }
    
    init();
  </script>
</body>
</html>
