<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>附件上传 - ChatLite</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    
    .form-card {
      background: white;
      border-radius: 8px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }
    
    .form-label {
      font-size: 14px;
      color: #595959;
      margin-bottom: 8px;
      font-weight: 500;
    }
    
    /* 上传区域 */
    .upload-area {
      border: 2px dashed #d9d9d9;
      border-radius: 8px;
      padding: 32px;
      text-align: center;
      background: #fafafa;
      cursor: pointer;
      transition: all 0.3s;
    }
    .upload-area:hover {
      border-color: #40a9ff;
      background: #e6f7ff;
    }
    .upload-area.dragover {
      border-color: #52c41a;
      background: #f6ffed;
    }
    
    .upload-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      color: #40a9ff;
    }
    .upload-text {
      font-size: 14px;
      color: #595959;
      margin-bottom: 8px;
    }
    .upload-hint {
      font-size: 12px;
      color: #8c8c8c;
    }
    
    /* 文件列表 */
    .file-list {
      margin-top: 16px;
    }
    .file-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: #fafafa;
      border-radius: 6px;
      margin-bottom: 8px;
      border: 1px solid #f0f0f0;
    }
    .file-icon {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .file-icon.image { background: #f6ffed; }
    .file-icon.document { background: #e6f7ff; }
    .file-icon.archive { background: #fff7e6; }
    
    .file-info {
      flex: 1;
      min-width: 0;
    }
    .file-name {
      font-size: 14px;
      color: #262626;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-size {
      font-size: 12px;
      color: #8c8c8c;
      margin-top: 2px;
    }
    .file-progress {
      height: 4px;
      background: #f0f0f0;
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }
    .file-progress-bar {
      height: 100%;
      background: #52c41a;
      border-radius: 2px;
      transition: width 0.3s;
    }
    
    .file-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .file-action-btn {
      width: 32px;
      height: 32px;
      border: 1px solid #d9d9d9;
      background: white;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8c8c8c;
      transition: all 0.2s;
    }
    .file-action-btn:hover {
      color: #52c41a;
      border-color: #52c41a;
    }
    .file-action-btn.danger:hover {
      color: #ff4d4f;
      border-color: #ff4d4f;
    }
    
    /* 图片预览 */
    .image-preview {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 12px;
      margin-top: 16px;
    }
    .preview-item {
      position: relative;
      border-radius: 6px;
      overflow: hidden;
      aspect-ratio: 1;
      border: 1px solid #f0f0f0;
    }
    .preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .preview-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .preview-item:hover .preview-overlay { opacity: 1; }
    .preview-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: white;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #595959;
    }
    .preview-btn:hover { background: #52c41a; color: white; }
    
    /* 上传按钮 */
    .upload-btn {
      margin-top: 16px;
      padding: 12px 24px;
      background: #52c41a;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .upload-btn:hover { background: #73d13d; }
    .upload-btn:disabled {
      background: #d9d9d9;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 style="margin-bottom: 20px;">📎 附件上传测试</h1>
    
    <!-- 上传区域 -->
    <div class="form-card">
      <div class="form-label">上传附件</div>
      <div class="upload-area" id="upload-area" onclick="document.getElementById('file-input').click()">
        <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
        </svg>
        <div class="upload-text">点击或拖拽文件到此处上传</div>
        <div class="upload-hint">支持图片、文档、压缩包等格式，单个文件最大 10MB</div>
        <input type="file" id="file-input" multiple style="display: none" onchange="handleFiles(this.files)">
      </div>
      
      <button class="upload-btn" onclick="uploadFiles()" id="upload-btn" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
        </svg>
        开始上传
      </button>
    </div>
    
    <!-- 文件列表 -->
    <div class="form-card">
      <div class="form-label">已选文件 (<span id="file-count">0</span>)</div>
      <div class="file-list" id="file-list">
        <div style="padding: 40px; text-align: center; color: #8c8c8c;">暂无文件</div>
      </div>
    </div>
    
    <!-- 图片预览 -->
    <div class="form-card">
      <div class="form-label">图片预览</div>
      <div class="image-preview" id="image-preview">
        <!-- 图片预览将动态加载 -->
      </div>
    </div>
  </div>

  <script>
    let files = [];
    
    // 拖拽上传
    const uploadArea = document.getElementById('upload-area');
    
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });
    
    uploadArea.addEventListener('dragleave', () => {
      uploadArea.classList.remove('dragover');
    });
    
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    });
    
    // 处理文件
    function handleFiles(fileList) {
      const newFiles = Array.from(fileList).map(file => ({
        file,
        id: Date.now() + Math.random(),
        name: file.name,
        size: formatSize(file.size),
        type: getFileType(file),
        progress: 0,
        status: 'pending'
      }));
      
      files = [...files, ...newFiles];
      renderFileList();
      renderImagePreview();
      updateUploadButton();
    }
    
    // 获取文件类型
    function getFileType(file) {
      if (file.type.startsWith('image/')) return 'image';
      if (file.type.includes('pdf') || file.type.includes('document')) return 'document';
      if (file.type.includes('zip') || file.type.includes('rar')) return 'archive';
      return 'document';
    }
    
    // 获取文件图标
    function getFileIcon(type) {
      const icons = {
        image: '🖼️',
        document: '📄',
        archive: '📦'
      };
      return icons[type] || '📄';
    }
    
    // 格式化大小
    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }
    
    // 渲染文件列表
    function renderFileList() {
      const container = document.getElementById('file-list');
      const count = document.getElementById('file-count');
      
      count.textContent = files.length;
      
      if (files.length === 0) {
        container.innerHTML = '<div style="padding: 40px; text-align: center; color: #8c8c8c;">暂无文件</div>';
        return;
      }
      
      container.innerHTML = files.map(item => `
        <div class="file-item">
          <div class="file-icon ${item.type}">${getFileIcon(item.type)}</div>
          <div class="file-info">
            <div class="file-name" title="${item.name}">${item.name}</div>
            <div class="file-size">${item.size}</div>
            <div class="file-progress">
              <div class="file-progress-bar" style="width: ${item.progress}%"></div>
            </div>
          </div>
          <div class="file-actions">
            ${item.type === 'image' ? `
              <button class="file-action-btn" onclick="previewImage('${item.id}')" title="预览">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            ` : ''}
            <button class="file-action-btn" onclick="downloadFile('${item.id}')" title="下载">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
            </button>
            <button class="file-action-btn danger" onclick="removeFile('${item.id}')" title="删除">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
              </svg>
            </button>
          </div>
        </div>
      `).join('');
    }
    
    // 渲染图片预览
    function renderImagePreview() {
      const container = document.getElementById('image-preview');
      const images = files.filter(f => f.type === 'image');
      
      if (images.length === 0) {
        container.innerHTML = '<div style="padding: 40px; text-align: center; color: #8c8c8c; grid-column: 1/-1;">暂无图片</div>';
        return;
      }
      
      container.innerHTML = images.map(item => `
        <div class="preview-item">
          <img src="${URL.createObjectURL(item.file)}" alt="${item.name}">
          <div class="preview-overlay">
            <button class="preview-btn" onclick="previewImage('${item.id}')">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
            <button class="preview-btn" onclick="removeFile('${item.id}')">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
              </svg>
            </button>
          </div>
        </div>
      `).join('');
    }
    
    // 更新上传按钮
    function updateUploadButton() {
      const btn = document.getElementById('upload-btn');
      btn.disabled = files.length === 0;
    }
    
    // 上传文件
    async function uploadFiles() {
      const btn = document.getElementById('upload-btn');
      btn.disabled = true;
      btn.innerHTML = '上传中...';
      
      // 模拟上传进度
      for (let i = 0; i < files.length; i++) {
        files[i].status = 'uploading';
        renderFileList();
        
        // 模拟进度
        for (let progress = 0; progress <= 100; progress += 10) {
          files[i].progress = progress;
          renderFileList();
          await new Promise(resolve => setTimeout(resolve, 100));
        }
        
        files[i].status = 'completed';
      }
      
      btn.disabled = false;
      btn.innerHTML = `
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
        </svg>
        开始上传
      `;
      
      alert(`✅ 成功上传 ${files.length} 个文件`);
    }
    
    // 移除文件
    function removeFile(id) {
      files = files.filter(f => f.id != id);
      renderFileList();
      renderImagePreview();
      updateUploadButton();
    }
    
    // 预览图片
    function previewImage(id) {
      const file = files.find(f => f.id == id);
      if (file && file.type === 'image') {
        const url = URL.createObjectURL(file.file);
        window.open(url, '_blank');
      }
    }
    
    // 下载文件
    function downloadFile(id) {
      const file = files.find(f => f.id == id);
      if (file) {
        const url = URL.createObjectURL(file.file);
        const a = document.createElement('a');
        a.href = url;
        a.download = file.name;
        a.click();
        URL.revokeObjectURL(url);
      }
    }
  </script>
</body>
</html>
