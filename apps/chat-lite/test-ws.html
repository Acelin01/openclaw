<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebSocket 连接测试</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #1a1a2e;
      color: #eee;
    }
    h1 { color: #00d9ff; }
    .status {
      padding: 10px;
      margin: 10px 0;
      border-radius: 4px;
      font-weight: bold;
    }
    .connected { background: #00aa55; }
    .connecting { background: #ffaa00; }
    .disconnected { background: #ff4444; }
    .log {
      background: #000;
      padding: 15px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      max-height: 400px;
      overflow-y: auto;
      white-space: pre-wrap;
    }
    button {
      background: #00d9ff;
      color: #000;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      margin: 5px;
    }
    button:hover { background: #00b8d9; }
    button:disabled { background: #666; cursor: not-allowed; }
    input {
      padding: 8px;
      border-radius: 4px;
      border: 1px solid #444;
      background: #222;
      color: #eee;
      margin: 5px;
    }
  </style>
</head>
<body>
  <h1>🔌 OpenClaw WebSocket 连接测试</h1>
  
  <div>
    <label>WebSocket URL: </label>
    <input type="text" id="wsUrl" value="ws://localhost:18789/ws" size="50">
    <label>Token: </label>
    <input type="text" id="token" value="test-token" size="30">
  </div>
  
  <div style="margin: 20px 0;">
    <button id="connectBtn" onclick="connect()">连接</button>
    <button id="disconnectBtn" onclick="disconnect()" disabled>断开</button>
    <button id="sendBtn" onclick="sendMessage()" disabled>发送消息</button>
  </div>
  
  <div id="status" class="status disconnected">未连接</div>
  
  <h3>📋 连接日志</h3>
  <div id="log" class="log"></div>

  <script>
    let ws = null;
    const logDiv = document.getElementById('log');
    const statusDiv = document.getElementById('status');
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const sendBtn = document.getElementById('sendBtn');

    function log(message, type = 'info') {
      const timestamp = new Date().toLocaleTimeString();
      const icon = type === 'error' ? '❌' : type === 'success' ? '✅' : '📝';
      logDiv.textContent += `[${timestamp}] ${icon} ${message}\n`;
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    function updateStatus(state) {
      statusDiv.className = 'status ' + state;
      statusDiv.textContent = state === 'connected' ? '✅ 已连接' : 
                              state === 'connecting' ? '⏳ 连接中...' : '❌ 未连接';
      
      connectBtn.disabled = state === 'connected' || state === 'connecting';
      disconnectBtn.disabled = state !== 'connected';
      sendBtn.disabled = state !== 'connected';
    }

    function connect() {
      const url = document.getElementById('wsUrl').value;
      const token = document.getElementById('token').value;
      
      log(`尝试连接：${url}`);
      updateStatus('connecting');
      
      ws = new WebSocket(url);
      
      ws.onopen = () => {
        log('WebSocket 连接成功');
        log('等待 server 发送 challenge...');
      };
      
      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          log(`收到：${JSON.stringify(data, null, 2)}`);
          
          // 处理 challenge
          if (data.type === 'event' && data.event === 'connect.challenge') {
            const nonce = data.payload?.nonce;
            if (nonce) {
              log(`收到 challenge，nonce: ${nonce.substring(0, 8)}...`);
              
              // 发送 connect 请求（符合 OpenClaw 协议）
              const connectMsg = {
                type: 'req',
                id: `connect-${Date.now()}`,
                method: 'connect',
                params: {
                  minProtocol: 1,
                  maxProtocol: 1,
                  client: {
                    id: 'webchat',
                    displayName: 'Test Client',
                    version: '1.0.0',
                    platform: 'web',
                    mode: 'webchat'  // 必须是 webchat, cli, ui, backend, node, probe, test 之一
                  },
                  auth: { token },
                  role: 'operator',  // 必须是 'operator' 或 'node'
                  scopes: ['operator.admin']  // operator 的默认 scope
                }
              };
              
              ws.send(JSON.stringify(connectMsg));
              log('已发送 connect 请求');
            }
          }
          
          // 处理 connect 响应
          if (data.type === 'res' && data.method === 'connect') {
            if (data.payload?.ok) {
              log('✅ 认证成功！', 'success');
              updateStatus('connected');
            } else {
              log(`❌ 认证失败：${JSON.stringify(data.payload)}`, 'error');
              updateStatus('disconnected');
            }
          }
        } catch (error) {
          log(`解析错误：${error.message}`, 'error');
        }
      };
      
      ws.onerror = (error) => {
        log(`WebSocket 错误：${error}`, 'error');
        updateStatus('disconnected');
      };
      
      ws.onclose = (code, reason) => {
        log(`连接关闭：code=${code}, reason=${reason}`);
        updateStatus('disconnected');
      };
    }

    function disconnect() {
      if (ws) {
        ws.close();
        ws = null;
        log('已断开连接');
      }
    }

    function sendMessage() {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        log('未连接，无法发送消息', 'error');
        return;
      }
      
      const msg = {
        type: 'req',
        id: `msg-${Date.now()}`,
        method: 'sessions_send',
        params: {
          message: '测试消息 from WebSocket test',
          sessionKey: 'agent:agent_xulinyi:main'
        }
      };
      
      ws.send(JSON.stringify(msg));
      log('已发送消息');
    }

    // 初始化
    updateStatus('disconnected');
    log('准备就绪，点击"连接"开始测试');
  </script>
</body>
</html>
