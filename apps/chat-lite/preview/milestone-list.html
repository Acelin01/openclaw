<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>里程碑列表预览</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f0f2f5;
            padding: 30px 20px;
        }
        .milestone-card {
            max-width: 1300px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
            overflow: hidden;
            border: 1px solid #e8e8e8;
        }
        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid #f0f0f0;
            background: #fafafa;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .card-header h2 {
            font-size: 18px;
            font-weight: 600;
            color: #1f1f1f;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .legend-tag {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f5f5f5;
            padding: 4px 12px;
            border-radius: 30px;
            border: 1px solid #e8e8e8;
            font-size: 13px;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }
        .legend-color.overdue { background: #ff4d4f; }
        .legend-color.progress { background: #52c41a; }
        .legend-color.today { background: #1890ff; }
        .btn-primary {
            background: #52c41a;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        .timeline-axis {
            padding: 20px 24px 16px 24px;
            border-bottom: 1px solid #f0f0f0;
        }
        .today-badge {
            background: #e6f7ff;
            color: #1890ff;
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 12px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .today-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            background: #1890ff;
            border-radius: 50%;
            display: inline-block;
        }
        .date-scale {
            display: flex;
            margin-top: 12px;
        }
        .scale-item {
            flex: 1;
            text-align: center;
            font-size: 13px;
            border-right: 1px dashed #e8e8e8;
            padding: 4px 0;
        }
        .scale-item:last-child { border-right: none; }
        .scale-item.today .date-label {
            background: #e6f7ff;
            color: #1890ff;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 4px;
        }
        .table-responsive { overflow-x: auto; }
        .milestone-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        .milestone-table th {
            background: #fafafa;
            padding: 14px 16px;
            text-align: left;
            font-weight: 500;
            color: #595959;
            border-bottom: 1px solid #f0f0f0;
        }
        .milestone-table td {
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
        }
        .milestone-table tbody tr:hover { background: #fafafa; }
        .milestone-name {
            font-weight: 500;
            max-width: 280px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .overdue-tag {
            background: #fff1f0;
            color: #cf1322;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 30px;
            margin-left: 6px;
            border: 1px solid #ffa39e;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-progress {
            background: #f6ffed;
            color: #52c41a;
            border: 1px solid #b7eb8f;
        }
        .status-notstart {
            background: #fff7e6;
            color: #d46b08;
            border: 1px solid #ffd591;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .user-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #52c41a;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }
        .action-group {
            display: flex;
            gap: 8px;
        }
        .action-icon {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            border-radius: 4px;
            cursor: pointer;
            color: #8c8c8c;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .action-icon:hover {
            background: #f5f5f5;
            color: #52c41a;
        }
        .card-footer {
            padding: 16px 24px;
            border-top: 1px solid #f0f0f0;
            background: #fafafa;
            font-size: 13px;
            color: #8c8c8c;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="milestone-card">
        <div class="card-header">
            <div class="header-left">
                <h2>
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                        <path d="M4 4H16V16H4V4Z" stroke="#52c41a" stroke-width="1.8"/>
                        <circle cx="10" cy="10" r="2" fill="#52c41a"/>
                        <path d="M4 8H16M4 12H16" stroke="#52c41a" stroke-width="1.8"/>
                    </svg>
                    里程碑
                </h2>
                <div class="legend-tag">
                    <span class="legend-color overdue"></span> 逾期
                    <span class="legend-color progress" style="margin-left: 8px;"></span> 进行中
                    <span class="legend-color today" style="margin-left: 8px;"></span> 当天
                </div>
            </div>
            <button class="btn-primary" onclick="alert('新建里程碑')">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="margin-right: 6px;">
                    <path d="M8 2V14M2 8H14" stroke="currentColor" stroke-width="1.8"/>
                </svg>
                新建里程碑
            </button>
        </div>
        
        <div class="timeline-axis">
            <div class="today-badge">当天 · 2026-03-02</div>
            <div class="date-scale">
                <div class="scale-item today"><span class="date-label">03-02</span></div>
                <div class="scale-item"><span class="date-label">03-09</span></div>
                <div class="scale-item"><span class="date-label">03-16</span></div>
                <div class="scale-item"><span class="date-label">03-23</span></div>
                <div class="scale-item"><span class="date-label">03-30</span></div>
            </div>
        </div>
        
        <div class="table-responsive">
            <table class="milestone-table">
                <thead>
                    <tr>
                        <th>名称</th>
                        <th>负责人</th>
                        <th>状态</th>
                        <th>计划完成时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            <span class="milestone-name">用户界面重构</span>
                            <span class="overdue-tag">已逾期</span>
                        </td>
                        <td>
                            <div class="user-info">
                                <span class="user-avatar">U</span>
                                <span>user-001</span>
                            </div>
                        </td>
                        <td><span class="status-badge status-progress">进行中</span></td>
                        <td>2026-03-01</td>
                        <td>
                            <div class="action-group">
                                <button class="action-icon" title="编辑">✏️</button>
                                <button class="action-icon" title="删除">🗑️</button>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td><span class="milestone-name">核心功能开发</span></td>
                        <td>
                            <div class="user-info">
                                <span class="user-avatar">U</span>
                                <span>user-002</span>
                            </div>
                        </td>
                        <td><span class="status-badge status-notstart">未开始</span></td>
                        <td>2026-03-15</td>
                        <td>
                            <div class="action-group">
                                <button class="action-icon" title="编辑">✏️</button>
                                <button class="action-icon" title="删除">🗑️</button>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div class="card-footer">
            共 2 个里程碑
        </div>
    </div>
</body>
</html>
