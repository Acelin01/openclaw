# 客户机器人 uxin Docker 部署配置
# 在本地创建虚拟的"远程服务器"

version: '3.8'

services:
  # FRP 服务器
  frps:
    image: snowdreamtech/frps:latest
    container_name: uxin-frps
    restart: unless-stopped
    network_mode: "host"
    volumes:
      - ./docker/frps.ini:/etc/frp/frps.ini:ro
    environment:
      - TZ=Asia/Shanghai
    command: frps -c /etc/frp/frps.ini

  # OpenClaw Gateway (运行在 Docker 中模拟远程服务器)
  openclaw-gateway:
    image: node:22-alpine
    container_name: uxin-gateway
    restart: unless-stopped
    network_mode: "host"
    working_dir: /app
    volumes:
      - /Users/mac/Documents/GitHub/openclaw:/app:ro
      - uxin-data:/root/.openclaw-dev
    environment:
      - NODE_ENV=production
      - OPENCLAW_SKIP_CHANNELS=1
      - CLAWDBOT_SKIP_CHANNELS=1
      - TZ=Asia/Shanghai
    command: >
      sh -c "npm install -g pnpm && 
             pnpm install --frozen-lockfile && 
             pnpm gateway:dev"
    depends_on:
      - frps

volumes:
  uxin-data:
    driver: local

networks:
  default:
    name: uxin-network
