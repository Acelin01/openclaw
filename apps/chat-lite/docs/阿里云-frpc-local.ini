# 本地电脑 FRPC 配置
# 使用方法：在本地电脑执行

[common]
# 阿里云 FRP 服务器地址（替换为你的阿里云公网 IP）
server_addr = 你的阿里云公网 IP
server_port = 7000
token = openclaw-platform-token-2026
log_file = ~/.openclaw-frp/frpc.log
log_level = info

# 本地 Gateway 隧道
[local-gateway]
type = tcp
local_ip = 127.0.0.1
local_port = 19001
remote_port = 60123
