# 客户机器 FRPC 配置
# 使用方法：在客户机器执行

[common]
# 阿里云 FRP 服务器地址（替换为你的阿里云公网 IP）
server_addr = 你的阿里云公网 IP
server_port = 7000
token = openclaw-platform-token-2026
log_file = ~/.openclaw-frp/frpc.log
log_level = info
client_id = machine-XLY.local

# 客户机器人 Gateway 隧道
[customer-gateway]
type = tcp
local_ip = 127.0.0.1
local_port = 19001
remote_port = 60124
